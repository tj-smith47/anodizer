# yaml-language-server: $schema=https://tj-smith47.github.io/anodizer/schema.json
# Anodizer dogfooding config — exercises as many features as possible.
# Templates use Tera syntax with Go-style compat.
#   - Pipe filters: {{ Tag | trimprefix(prefix='v') }}
#   - Variables: {{ RawVersion }}, {{ Branch }}, {{ CommitDate }}, etc.
#
# Shared publisher / archive config is hoisted into `defaults:` so
# per-crate entries inherit (`{}` or omission inherits verbatim;
# `skip: true` suppresses inheritance for that block).

version: 2
project_name: anodizer
dist: ./dist

# Show artifact file sizes after build (confirms report_sizes wiring)
report_sizes: true

# Top-level env vars available to all template expressions
env:
  - RELEASE_TYPE=stable

# Custom template variables accessible as {{ Var.repo_url }}
variables:
  repo_url: "https://github.com/tj-smith47/anodizer"
  description: "A Rust-native release automation tool"

# Git tag discovery settings
git:
  tag_sort: "smartsemver"
  ignore_tags:
    - "nightly"
  ignore_tag_prefixes:
    - "draft-"
  prerelease_suffix: "-"

# Auto-tagging configuration (used by `anodizer tag`)
tag:
  default_bump: patch
  tag_prefix: "v"
  release_branches:
    - main
    - master
  initial_version: "0.1.0"

# Project metadata written to dist/metadata.json
metadata:
  description: "A Rust-native release automation tool"
  homepage: "https://github.com/tj-smith47/anodizer"
  license: MIT
  maintainers:
    - "TJ Smith"
  mod_timestamp: "{{ CommitTimestamp }}"
  full_description:
    from_file: README.md
  commit_author:
    name: TJ Smith
    email: tj@jarvispro.io

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  # Per-build settings (flags/ignore/overrides) live under defaults.builds.*.
  # `binary` is omitted here — defaults supply only the cross-cutting fields,
  # the per-crate `builds[].binary` names the actual cargo bin target.
  builds:
    flags:
      - --release
  # Single archive entry shared by every crate. The first entry of `formats`
  # is the identity key the merge engine uses to fold this into per-crate
  # archives, so the CLI's per-crate archive entry below mirrors the same
  # `formats: [tar.gz]` to deep-merge fields into a single resolved archive
  # instead of producing two.
  archives:
    formats: [tar.gz]
    format_overrides:
      - os: windows
        formats: [zip]
    hooks:
      before:
        - "echo packing {{ ProjectName }} {{ Tag }} format={{ Format }}"
      after:
        - "echo packed {{ ProjectName }} {{ Tag }} format={{ Format }}"
  checksum:
    algorithm: sha256
  # Publisher inheritance: `cargo: {}` opts every crate into crates.io
  # publishing. Per-crate `publish.cargo: { skip: true }` suppresses inheritance
  # for that crate (DEC-9). `index_timeout` defaults to 300s in the publisher,
  # so it is omitted here (keeping the empty `{}` is the explicit opt-in).
  publish:
    cargo: {}

before:
  hooks:
    # Generate the release-time man page artifact. CI gates fmt + clippy
    # + cargo test on every push; running them again at release time was
    # double-running (~5 min wasted per release) AND caused nested-harness
    # recursion when `anodize check determinism` ran the release pipeline,
    # which ran `cargo test`, which ran integration tests that themselves
    # spawn `anodize check determinism`. The validation gate stays in CI;
    # this hook stays focused on artifact generation.
    - mkdir -p dist && cargo run --release --bin anodizer -- man > dist/anodizer.1

after:
  hooks:
    - echo "Release complete for {{ ProjectName }} {{ Tag }}"

crates:
  # --- Tier 1: core (no workspace deps) ---
  - name: anodizer-core
    path: crates/core
    tag_template: "v{{ Version }}"

  # --- Tier 2: stage crates (depend on core) ---
  # All inherit defaults.publish.cargo = {} (DEC-9). No per-crate publish block
  # required — each opts in via the inherited cargo publisher slot.
  - name: anodizer-stage-build
    path: crates/stage-build
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-archive
    path: crates/stage-archive
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-nfpm
    path: crates/stage-nfpm
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-checksum
    path: crates/stage-checksum
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-changelog
    path: crates/stage-changelog
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-release
    path: crates/stage-release
    tag_template: "v{{ Version }}"
    # Real Cargo.toml deps: anodizer-core, anodizer-stage-checksum.
    # Anodizer's cargo publisher topologically sorts on this list, so
    # missing entries cause "no matching package" failures when an
    # alphabetically-earlier crate is published before its dep.
    depends_on: [anodizer-core, anodizer-stage-checksum]
  - name: anodizer-stage-publish
    path: crates/stage-publish
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-release]
  - name: anodizer-stage-docker
    path: crates/stage-docker
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-sign
    path: crates/stage-sign
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-announce
    path: crates/stage-announce
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-publish]
  - name: anodizer-stage-source
    path: crates/stage-source
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-upx
    path: crates/stage-upx
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-snapcraft
    path: crates/stage-snapcraft
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-dmg
    path: crates/stage-dmg
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-msi
    path: crates/stage-msi
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-pkg
    path: crates/stage-pkg
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-blob
    path: crates/stage-blob
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-nsis
    path: crates/stage-nsis
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-appbundle
    path: crates/stage-appbundle
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-flatpak
    path: crates/stage-flatpak
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-notarize
    path: crates/stage-notarize
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-templatefiles
    path: crates/stage-templatefiles
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-makeself
    path: crates/stage-makeself
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-srpm
    path: crates/stage-srpm
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-sbom
    path: crates/stage-sbom
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]

  # --- Tier 3: CLI binary (depends on all stages) ---
  - name: anodizer
    path: crates/cli
    tag_template: "v{{ Version }}"
    depends_on:
      - anodizer-core
      - anodizer-stage-build
      - anodizer-stage-archive
      - anodizer-stage-nfpm
      - anodizer-stage-checksum
      - anodizer-stage-changelog
      - anodizer-stage-release
      - anodizer-stage-publish
      - anodizer-stage-docker
      - anodizer-stage-sign
      - anodizer-stage-announce
      - anodizer-stage-source
      - anodizer-stage-upx
      - anodizer-stage-snapcraft
      - anodizer-stage-dmg
      - anodizer-stage-msi
      - anodizer-stage-pkg
      - anodizer-stage-blob
      - anodizer-stage-nsis
      - anodizer-stage-appbundle
      - anodizer-stage-flatpak
      - anodizer-stage-notarize
      - anodizer-stage-templatefiles
      - anodizer-stage-makeself
      - anodizer-stage-srpm
      - anodizer-stage-sbom
    builds:
      - binary: anodizer
        features: []
        no_default_features: false
    docker_v2:
      - id: anodizer
        dockerfile: Dockerfile
        images:
          - ghcr.io/tj-smith47/anodizer
        labels:
          io.modelcontextprotocol.server.name: io.github.tj-smith47/anodizer
        tags:
          - "{{ .Version }}"
          - latest
        platforms:
          - linux/amd64
          - linux/arm64
    archives:
      # `formats: [tar.gz]` mirrors the defaults identity key so this entry
      # deep-merges with the defaults archive (picking up format_overrides)
      # rather than appearing as a second entry.
      - name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
        formats: [tar.gz]
        files:
          - LICENSE
          - README.md
          - docs/site/content/docs/reference/configuration.md
      # Second archive entry exercises tar.xz / tar.zst on unix and tgz on
      # windows. Name suffix `-extra` keeps outputs from colliding with the
      # primary entry above.
      - id: extra
        name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-extra"
        formats: [tar.xz, tar.zst]
        format_overrides:
          - os: windows
            formats: [tgz]
        files:
          - LICENSE
          - README.md
    checksum:
      name_template: "{{ ArtifactName }}.sha256"
      algorithm: sha256
      split: true
    binstall:
      # Auto-derived: anodize renders a per-target `overrides.<triple>` for every
      # build target from this crate's own archive `name_template` + release repo,
      # so the cargo-binstall `pkg_url` always matches the asset the release
      # uploads. No hand-written `pkg_url`/`overrides` needed (supply either to
      # take full manual control).
      enabled: true
    release:
      github:
        owner: tj-smith47
        name: anodizer
      draft: false
      prerelease: auto
      make_latest: auto
      mode: keep-existing
      target_commitish: "{{ .Commit }}"
      discussion_category_name: "Announcements"
      replace_existing_draft: true
      replace_existing_artifacts: true
      name_template: "{{ ProjectName }} {{ Tag }}"
      header: |
        ## What's new in {{ .Tag }}
      footer: |
        ---
        Released with [anodizer](https://github.com/tj-smith47/anodizer) 🦀
      include_meta: true
      # Attach the apk-signing public key alongside the signed apk(s).
      # anodizer-action's `apk-private-key` input derives the pub key from
      # the private key and drops it into ./dist/. apk verifiers install
      # this file under /etc/apk/keys/ before `apk add`-ing a signed
      # package. `allow_empty: true` skips the glob silently when the
      # file is absent (local snapshot / dry-run flows where no secret
      # was provisioned).
      extra_files:
        - glob: "dist/*-apk-signing-key.rsa.pub"
          allow_empty: true
        - glob: "dist/anodizer.1"
          allow_empty: true
    publish:
      # `cargo:` inherits from defaults.publish.cargo (= {} → presence-as-opt-in).
      # Other publishers below are CLI-only, so they live per-crate.
      # Homebrew is handled exclusively via the top-level `homebrew_casks:` block.
      scoop:
        required: false
        repository:
          owner: tj-smith47
          name: scoop-bucket
        ids:
          - default
        description: "A Rust-native release automation tool"
        homepage: "https://github.com/tj-smith47/anodizer"
        license: MIT
        depends:
          - git
        shortcuts:
          - ["anodizer.exe", "Anodizer"]
        commit_msg_template: "anodizer {{ .Tag }}"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
      chocolatey:
        required: false
        repository:
          owner: tj-smith47
          name: anodizer
        title: "Anodizer"
        summary: "A Rust-native release automation tool"
        description: "A Rust-native release automation tool"
        authors: "TJ Smith"
        owners: "tj-smith47"
        copyright: "Copyright © 2026 TJ Smith"
        license: MIT
        require_license_acceptance: false
        project_url: "https://github.com/tj-smith47/anodizer"
        package_source_url: "https://github.com/tj-smith47/anodizer/tree/{{ .Tag }}/crates/cli"
        docs_url: "https://tj-smith47.github.io/anodizer/docs/reference/configuration/"
        bug_tracker_url: "https://github.com/tj-smith47/anodizer/issues"
        release_notes: "https://github.com/tj-smith47/anodizer/releases/tag/{{ .Tag }}"
        icon_url: "https://raw.githubusercontent.com/tj-smith47/anodizer/master/assets/logo.png"
        tags:
          - release
          - automation
          - rust
        republish_in_moderation: true
      winget:
        required: false
        repository:
          owner: tj-smith47
          name: winget-pkgs
        short_description: "Rust-native release automation"
        description: "A Rust-native release automation tool"
        homepage: "https://github.com/tj-smith47/anodizer"
        license: MIT
        author: "TJ Smith"
        copyright: "Copyright © 2026 TJ Smith"
        package_identifier: "TJSmith.Anodizer"
        publisher: "TJ Smith"
        publisher_url: "https://github.com/tj-smith47"
        publisher_support_url: "https://github.com/tj-smith47/anodizer/issues"
        release_notes: "See release-notes URL for the full changelog."
        release_notes_url: "https://github.com/tj-smith47/anodizer/releases/tag/{{ .Tag }}"
        installation_notes: "Run `anodizer --help` after installation."
        tags:
          - release
          - automation
          - rust
        commit_msg_template: "anodizer {{ .Tag }}"
        # Rust/MSVC binaries dynamically link against the VC++ 2015+
        # runtime. Without this dependency declared, winget's automated
        # validation fails at invocation time with STATUS_DLL_NOT_FOUND
        # (exit code -1073741515).
        dependencies:
          - package_identifier: "Microsoft.VCRedist.2015+.x64"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
        update_existing_pr: true
      aur:
        required: false
        git_url: "ssh://aur@aur.archlinux.org/anodizer-bin.git"
        name: anodizer-bin
        description: "A Rust-native release automation tool"
        license: MIT
        depends:
          - glibc
        # Binary-only package(): anodizer's archive bundles LICENSE/README only
        # (no completions/man), so there is nothing extra to install here. To
        # ship completions+man on AUR, bundle them into the archive stage first.
        private_key: "{{ .Env.AUR_SSH_KEY }}"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
      nix:
        required: false
        name: anodizer
        repository:
          owner: tj-smith47
          name: nix-pkgs
        homepage: "https://github.com/tj-smith47/anodizer"
        description: "A Rust-native release automation tool"
        license: mit
        skip_upload: false
        formatter: alejandra
        extra_install: |
          installManPage share/man/man1/anodizer.1
        post_install: |
          echo "Installed anodizer. Run 'anodizer init' to scaffold a config."
        commit_msg_template: "anodizer {{ .Tag }}"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
      krew:
        required: false
        skip: true  # anodizer is not a kubectl plugin — krew is not an appropriate channel
        repository:
          owner: tj-smith47
          name: krew-index
        short_description: "A Rust-native release automation tool"
        homepage: "https://github.com/tj-smith47/anodizer"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
    nfpm:
      - id: default
        package_name: anodizer
        formats:
          - deb
          - rpm
          - apk
        vendor: "TJ Smith"
        homepage: "https://github.com/tj-smith47/anodizer"
        maintainer: "TJ Smith <tj@jarvispro.io>"
        description: "A Rust-native release automation tool"
        license: MIT
        bindir: /usr/bin
        section: utils
        priority: optional
        epoch: "1"
        release: "1"
        umask: "0o002"
        mtime: "{{ CommitDate }}"
        recommends:
          - git
        suggests:
          - upx
        provides:
          - anodizer
        file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
        contents:
          - src: LICENSE
            dst: /usr/share/doc/anodizer/LICENSE
          - src: README.md
            dst: /usr/share/doc/anodizer/README.md
        # Package signing uses two distinct key materials:
        #   * GPG_KEY_PATH         -> GPG-armored secret key, consumed by deb
        #                             (dpkg-sig) and rpm (rpmsign).
        #   * APK_PRIVATE_KEY_PATH -> raw PEM RSA private key, consumed by
        #                             nfpm's apk packager (RSA-PSS, not OpenPGP).
        # Requires `GPG_KEY_PATH` env pointing at an exported secret key file:
        #   gpg --export-secret-keys --armor <fingerprint> > ~/.gnupg/anodizer-signing.asc
        #   export GPG_KEY_PATH=~/.gnupg/anodizer-signing.asc
        # Same key material as `signs:` (which uses keyring lookup via fingerprint);
        # nfpm-side tools (rpmsign / dpkg-sig) need a file path on disk.
        deb:
          signature:
            key_file: "{{ .Env.GPG_KEY_PATH }}"
            type: origin
        rpm:
          group: Development/Tools
          packager: "TJ Smith <tj@jarvispro.io>"
          signature:
            key_file: "{{ .Env.GPG_KEY_PATH }}"
        apk:
          signature:
            # apk-tools uses its own RSA-PSS scheme, not OpenPGP. nfpm's apk
            # packager parses the key via Go's `pem.Decode`, so the file at
            # this path must be a raw PEM RSA private key, not the GPG-armored
            # `-----BEGIN PGP PRIVATE KEY BLOCK-----` deb / rpm consume.
            # Provisioned by the `apk-private-key` step in anodizer-action,
            # which writes the `APK_PRIVATE_KEY` repo secret to a temp file
            # and derives the matching public key alongside.
            key_file: "{{ .Env.APK_PRIVATE_KEY_PATH }}"
    snapcrafts:
      - id: default
        name: anodizer
        title: "Anodizer"
        # icon: omitted intentionally — Snap Store snap.json validation
        # rejects the `icon` field with "Additional properties are not
        # allowed". snapcraft pack still emits a valid snap, but upload
        # fails. Place the icon at snap/gui/icon.png in the project tree
        # instead (the recommended path that doesn't end up in snap.json).
        base: core24
        summary: "A Rust-native release automation tool"
        description: |
          Anodizer is a release automation tool for Rust projects, inspired by
          GoReleaser. It handles building, packaging, publishing, and announcing
          releases across multiple platforms and package managers.
        grade: stable
        confinement: strict
        license: MIT
        publish: true
        channel_templates:
          - "latest/stable"
        apps:
          anodizer:
            command: anodizer
            plugs:
              - home
              - network
              - network-bind
    flatpaks:
      - skip: true  # disabled — no Flatpak runtime configured yet
        app_id: io.github.tj_smith47.Anodizer
        runtime: org.freedesktop.Platform
        runtime_version: "24.08"
        sdk: org.freedesktop.Sdk
        command: anodizer
        finish_args:
          - "--share=network"
          - "--filesystem=host"
    app_bundles:
      - skip: true  # disabled — no macOS app bundle identity configured
        bundle: io.github.tj-smith47.anodizer
        name: Anodizer
    dmgs:
      - skip: true  # disabled — no macOS DMG configured (needs app_bundle first)
        name: Anodizer
    pkgs:
      - skip: true  # disabled — no macOS PKG signing identity configured
        identifier: io.github.tj-smith47.anodizer
    msis:
      - skip: true  # disabled — no WiX source file (.wxs) created
        name: Anodizer
    nsis:
      - skip: true  # disabled — no NSIS script created
        name: Anodizer
    blobs:
      - skip: true  # disabled — no cloud storage configured
        provider: s3
        bucket: anodizer-releases

# Top-level Homebrew Cask publisher — GR v2.16+ supported path.
# GoReleaser v2.16 fully deprecated `brews:` (Formula). This block uses the
# structured `homebrew_casks:` surface, which unlocks completions, manpages,
# binaries, caveats, uninstall, and zap as first-class fields instead of raw
# Ruby strings in post_install.
homebrew_casks:
  - required: false
    repository:
      owner: tj-smith47
      name: homebrew-tap
    directory: Casks
    ids:
      - default
    description: "A Rust-native release automation tool"
    homepage: "https://github.com/tj-smith47/anodizer"
    license: MIT
    # Installs the CLI binary as a Homebrew Cask binary stub.
    binaries:
      - anodizer
    # Shell completions are runtime-generated by the binary itself; no pre-built
    # completion files are emitted by the build pipeline (before.hooks only
    # produces dist/anodizer.1). generate_completions_from_executable instructs
    # Homebrew to call `anodizer completion <shell>` at cask install time.
    generate_completions_from_executable:
      executable: anodizer
      args:
        - completion
      base_name: anodizer
      shells:
        - bash
        - zsh
        - fish
    # Manpage produced by `before.hooks` → `dist/anodizer.1`, attached to the
    # GitHub Release as an extra_file; Homebrew downloads it from the release.
    manpages:
      - anodizer.1
    caveats: |
      Run `anodizer init` to scaffold a config in your repo.
    dependencies:
      - formula: git
    commit_msg_template: "anodizer {{ .Tag }}"
    commit_author:
      name: TJ Smith
      email: tj@jarvispro.io

notarize:
  skip: true  # disabled — no Apple Developer credentials configured

template_files:
  - id: install-script
    src: scripts/install.sh.tpl
    dst: install.sh
    mode: "0755"

changelog:
  use: github-native
  title: "Changelog"
  header: "# Changelog for {{ ProjectName }}"
  divider: "---"
  sort: asc
  abbrev: 12
  format: "* {{ .SHA }} {{ .Message }} ({{ .AuthorUsername }})"
  paths:
    - "crates/**"
    - "Cargo.toml"
    - "Cargo.lock"
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Others
      order: 999
  footer: |
    _Generated by anodizer._

signs:
  - id: default
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
    env:
      - "GPG_TTY={{ Env.GPG_TTY }}"
    # Tera-correct: `not IsSnapshot` doesn't short-circuit because Tera treats
    # both "true" and "false" as truthy non-empty strings. Compare explicitly
    # so the rendered output is empty in snapshot mode (process.rs treats
    # empty / "false" as skip) and "true" in release mode.
    if_condition: '{% if IsSnapshot == "false" or IsHarness == "true" %}true{% endif %}'

source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  prefix_template: "{{ ProjectName }}-{{ Version }}/"
  files:
    - "crates/**/*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
    - "LICENSE"
    - "README.md"

sboms:
  # Built-in CycloneDX from Cargo.lock — omit `cmd`/`args` to opt out of
  # syft. Built-in emits an SDE-pinned timestamp and a project-derived
  # deterministic serialNumber, so every run produces byte-identical SBOMs.
  - id: default
    enabled: true
    documents:
      - "{{ .ArtifactName }}.cdx.json"
    artifacts: archive

upx:
  - id: default
    enabled: true
    binary: upx
    args:
      - "--best"
      - "--lzma"
    compress: "9"
    lzma: true
    # UPX doesn't support macOS ARM or Windows ARM binaries
    targets:
      - "x86_64-unknown-linux-gnu"
      - "aarch64-unknown-linux-gnu"
      - "x86_64-apple-darwin"
      - "x86_64-pc-windows-msvc"

nightly:
  name_template: "{{ ProjectName }}-nightly"
  tag_name: nightly
  publish_release: true
  keep_single_release: true

snapshot:
  version_template: "{{ Tag | trimprefix(prefix='v') }}-SNAPSHOT-{{ ShortCommit }}"

# Split/merge CI configuration for fan-out builds
partial:
  by: os

# Binary-level signing (separate from archive/checksum signing above)
binary_signs:
  - id: default
    artifacts: binary
    cmd: cosign
    args:
      - "sign-blob"
      - "--key=env://COSIGN_KEY"
      - "--bundle={{ Signature }}"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    # See archive `signs:` block above for why this form is required.
    if_condition: '{% if IsSnapshot == "false" or IsHarness == "true" %}true{% endif %}'

# Docker image signing
docker_signs:
  - id: default
    artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "--key=env://COSIGN_KEY"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    # See archive `signs:` block above for why this form is required.
    if_condition: '{% if IsSnapshot == "false" or IsHarness == "true" %}true{% endif %}'

# Milestone closing — close GitHub milestones matching the release tag
milestones:
  - repo:
      owner: tj-smith47
      name: anodizer
    close: false  # disabled — no milestones configured yet
    fail_on_error: false
    name_template: "{{ Tag }}"

# DockerHub description sync
dockerhub:
  - skip: true  # disabled — no DockerHub image for anodizer
    username: "{{ Env.DOCKERHUB_USERNAME }}"
    description: "A Rust-native release automation tool"

# Artifactory upload configurations
artifactories:
  - name: production
    skip: true  # disabled — no Artifactory instance
    target: "https://artifactory.example.com/generic-local/anodizer/{{ Tag }}/"
    method: PUT

# CloudSmith publisher
cloudsmiths:
  - organization: jarvispro
    repository: anodizer
    formats: [deb, rpm, alpine]
    distributions:
      deb: any-distro/any-version
      rpm: any-distro/any-version
      alpine: alpine/any-version
    republish: true  # prevents MD5 conflict when re-cutting a version

# Note: the `npms:` publisher was removed (npm targets the Node.js
# registry, which a Rust crate cannot populate). For deb/rpm/apk uploads
# use the `gemfury:`, `cloudsmiths:`, or `artifactories:` publishers.

# MCP (Model Context Protocol) server registry publisher.
#
# Publishes an apiv0.ServerJSON document to https://registry.modelcontextprotocol.io
# after a GitHub Actions OIDC token exchange. The `auth.type=github-oidc` path
# requires `id-token: write` on the publishing workflow — anodizer.yml's release
# job already grants this.
#
mcp:
  name: io.github.tj-smith47/anodizer
  title: Anodizer
  description: "Rust release tooling — drop-in GoReleaser parity + Rust extras."
  homepage: https://github.com/tj-smith47/anodizer
  repository:
    url: https://github.com/tj-smith47/anodizer
    source: github
  packages:
    - registry_type: oci
      identifier: ghcr.io/tj-smith47/anodizer
      transport:
        type: stdio
  auth:
    type: github-oidc

# Source RPM configuration
srpm:
  enabled: true
  package_name: anodizer
  spec_file: anodizer.spec
  file_name_template: "{{ ProjectName }}-{{ RawVersion }}-1.src.rpm"

# Makeself self-extracting archives
makeselfs:
  - id: default
    name: "Anodizer Installer"
    script: scripts/makeself-install.sh
    filename: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-installer.run"

announce:
  # required_publishers (default): announce only when every required Assets/Manager/Submitter
  # publisher succeeded. all_publishers tightens to every configured publisher.
  # none disables the gate. Default is required_publishers.
  gate_on: required_publishers
  discord:
    enabled: false
    webhook_url: "{{ Env.DISCORD_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  discourse:
    enabled: false
    url: "{{ Env.DISCOURSE_URL }}"
    api_key: "{{ Env.DISCOURSE_API_KEY }}"
    category: releases
    title_template: "{{ ProjectName }} {{ Tag }} released"
  slack:
    enabled: false
    webhook_url: "{{ Env.SLACK_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  webhook:
    enabled: true
    endpoint_url: "https://tj.jarvispro.io/webhooks/anodizer"
    content_type: application/json
    message_template: '{"project":"{{ ProjectName }}","tag":"{{ Tag }}","url":"{{ ReleaseURL }}"}'
    headers:
      X-Anodizer-Source: "release"
    skip_tls_verify: false
    expected_status_codes:
      - 200
      - 202
  telegram:
    enabled: false
    bot_token: "{{ Env.TELEGRAM_BOT_TOKEN }}"
    chat_id: "{{ Env.TELEGRAM_CHAT_ID }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
    parse_mode: MarkdownV2
  teams:
    enabled: false
    webhook_url: "{{ Env.TEAMS_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  mattermost:
    enabled: false
    webhook_url: "{{ Env.MATTERMOST_WEBHOOK_URL }}"
    channel: releases
    username: release-bot
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  email:
    enabled: true
    host: smtp.gmail.com
    port: 587
    username: toss45@gmail.com
    from: toss45@gmail.com
    to:
      - "tj@jarvispro.io"
    subject_template: "{{ ProjectName }} {{ Tag }} released"
    message_template: "{{ ProjectName }} {{ Tag }} is now available at {{ ReleaseURL }}"
    encryption: starttls
    insecure_skip_verify: false
  reddit:
    enabled: false
    title_template: "{{ ProjectName }} {{ Tag }} released"
    url: "{{ ReleaseURL }}"
  twitter:
    enabled: false
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  mastodon:
    enabled: false
    server: "{{ Env.MASTODON_SERVER }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  bluesky:
    enabled: false
    username: "{{ Env.BLUESKY_USERNAME }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  linkedin:
    enabled: false
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  opencollective:
    enabled: false
    slug: "{{ Env.OPENCOLLECTIVE_SLUG }}"
    title_template: "{{ ProjectName }} {{ Tag }} released"
