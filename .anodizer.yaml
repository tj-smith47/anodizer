# yaml-language-server: $schema=https://tj-smith47.github.io/anodizer/schema.json
# Anodizer dogfooding config — exercises as many features as possible.
# Templates use Tera syntax with Go-style compat.
#   - Pipe filters: {{ Tag | trimprefix(prefix='v') }}
#   - Variables: {{ RawVersion }}, {{ Branch }}, {{ CommitDate }}, etc.
#
# Shared publisher / archive config is hoisted into `defaults:` so
# per-crate entries inherit (`{}` or omission inherits verbatim;
# `skip: true` suppresses inheritance for that block).

version: 2
project_name: anodizer
dist: ./dist

# Show artifact file sizes after build (confirms report_sizes wiring)
report_sizes: true

# Cap total retry wall-time under the publish-npm job's 20m timeout so a
# registry transient storm exits cleanly (idempotent re-run recovers) instead
# of being killed mid-publish and leaving a partial, immutable npm release.
retry:
  max_elapsed: 15m

# Non-secret config loaded from a tracked file; overridable per-environment.
env_files:
  - .env.release

# Top-level env vars that must be resolved at runtime (override .env.release if set)
env:
  - RELEASE_TYPE=stable

# Custom template variables accessible as {{ Var.repo_url }}
variables:
  repo_url: "https://github.com/tj-smith47/anodizer"
  description: "A Rust-native release automation tool"

# Git tag discovery settings
git:
  tag_sort: "smartsemver"
  ignore_tags:
    - "nightly"
  ignore_tag_prefixes:
    - "draft-"
  prerelease_suffix: "-"

# Auto-tagging configuration (used by `anodizer tag`)
tag:
  # Conventional-commit contract: a range with no #token and no feat/fix/breaking
  # marker (chore/docs/ci-only) produces no release. This is also the unset default.
  default_bump: none
  # Pre-1.0: a breaking change keeps anodizer in 0.x (0.5.0 -> 0.6.0), not 1.0.0.
  # Reaching 1.0.0 is a deliberate act (#major token / custom_tag / manifest bump).
  bump_minor_pre_major: true
  tag_prefix: "v"
  release_branches:
    - main
    - master
  initial_version: "0.1.0"

# Project metadata written to dist/metadata.json
metadata:
  description: "A Rust-native release automation tool"
  homepage: "https://github.com/tj-smith47/anodizer"
  # Drives the OCI `org.opencontainers.image.documentation` label and the
  # `{{ Metadata.Documentation }}` template var.
  documentation: "https://tj-smith47.github.io/anodizer"
  maintainers:
    - "TJ Smith"
  mod_timestamp: "{{ CommitTimestamp }}"
  full_description:
    from_file: README.md
  commit_author:
    name: TJ Smith
    email: tj@jarvispro.io

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  # Per-build settings (flags/ignore/overrides) live under defaults.builds.*.
  # `binary` is omitted here — defaults supply only the cross-cutting fields,
  # the per-crate `builds[].binary` names the actual cargo bin target.
  builds:
    flags:
      - --release
  # Single archive entry shared by every crate. The first entry of `formats`
  # is the identity key the merge engine uses to fold this into per-crate
  # archives, so the CLI's per-crate archive entry below mirrors the same
  # `formats: [tar.gz]` to deep-merge fields into a single resolved archive
  # instead of producing two.
  archives:
    formats: [tar.gz]
    format_overrides:
      - os: windows
        formats: [zip]
    hooks:
      before:
        - "echo packing {{ ProjectName }} {{ Tag }} format={{ Format }}"
      after:
        - "echo packed {{ ProjectName }} {{ Tag }} format={{ Format }}"
  checksum:
    algorithm: sha256
  # Publisher inheritance: `cargo: {}` opts every crate into crates.io
  # publishing. Per-crate `publish.cargo: { skip: true }` suppresses inheritance
  # for that crate (DEC-9). `index_timeout` defaults to 300s in the publisher,
  # so it is omitted here (keeping the empty `{}` is the explicit opt-in).
  # Every live publisher carries `required: true`: a failed publisher must
  # block the release instead of vanishing into a green run — re-runs are
  # idempotent for the publishers configured here (republish levers set
  # below), and the workflow_dispatch republish path recovers a partial
  # release safely. `required` also arms the irreversible-publisher
  # (submitter) gate and the `announce.gate_on: required_publishers` gate,
  # both of which are inert when nothing is required.
  publish:
    cargo:
      required: true
      retain_on_rollback: true
    on_error:
      # anodizer notify --raw: --raw skips Tera rendering so the
      # remote-controlled $ANODIZER_ERROR (HTTP bodies / git stderr) can never
      # smuggle a {{ Env.SECRET }} reference into the outbound message. The
      # error text is passed via the ANODIZER_* env channel (double-quoted, so
      # sh expands it into a single argv) — never template-spliced into the
      # command string, where shell metacharacters would be injection.
      - cmd: 'anodizer notify --raw "anodizer: publisher $ANODIZER_PUBLISHER failed for $ANODIZER_TAG: $ANODIZER_ERROR"'

before:
  hooks:
    # Generate the release-time man page artifact. CI gates fmt + clippy
    # + cargo test on every push; running them again at release time was
    # double-running (~5 min wasted per release) AND caused nested-harness
    # recursion when `anodize check determinism` ran the release pipeline,
    # which ran `cargo test`, which ran integration tests that themselves
    # spawn `anodize check determinism`. The validation gate stays in CI;
    # this hook stays focused on artifact generation.
    - mkdir -p dist && cargo run --release --bin anodizer -- man > dist/anodizer.1

after:
  hooks:
    - echo "Release complete for {{ ProjectName }} {{ Tag }}"

# Pre-publish integrity gate — runs after build/sign/checksum, before any
# one-way-door publisher dispatches. Each entry runs once (run_once) and walks
# the dist dir itself. A non-zero exit aborts the release before crates.io /
# GitHub / blobs receive anything.
before_publish:
  hooks:
    # Gate 1: at least one checksum file must exist and be non-empty. The glob
    # spans both checksum modes so the gate is invariant to the `checksum.split`
    # setting: split mode emits `*.sha256` sidecars, non-split emits a combined
    # `*_checksums.txt` — a mode-specific glob would false-abort a healthy
    # release whenever the other mode is configured. `shopt -s nullglob`
    # collapses an unmatched glob to an empty set, so the empty-first-element
    # check aborts rather than passing vacuously; `test -s` then fails on any
    # empty file in the set.
    - cmd: 'bash -c ''shopt -s nullglob; f=(dist/*_checksums.txt dist/*.sha256); [ -n "${f[0]:-}" ] || { echo "FATAL: no checksum files in dist/" >&2; exit 1; }; for c in "${f[@]}"; do test -s "$c" || { echo "FATAL: checksum file missing or empty: $c" >&2; exit 1; }; done'''
      run_once: true
      output: true
    # Gate 2: every release archive must be a non-empty, readable archive. The
    # glob enumerates every configured archive format (primary `tar.gz`/`zip`
    # plus the `-extra` entry's `tar.xz`/`tar.zst`/`tgz`); omitting a format
    # would leave its archives unchecked and could abort vacuously when only
    # that format is present. Same nullglob + empty-first-element guard.
    - cmd: 'bash -c ''shopt -s nullglob; f=(dist/*.tar.gz dist/*.zip dist/*.tar.xz dist/*.tar.zst dist/*.tgz); [ -n "${f[0]:-}" ] || { echo "FATAL: no release archives in dist/" >&2; exit 1; }; for a in "${f[@]}"; do test -s "$a" || { echo "FATAL: archive missing or empty: $a" >&2; exit 1; }; done'''
      run_once: true
      output: true

crates:
  # --- Tier 1: core (no workspace deps) ---
  - name: anodizer-core
    path: crates/core
    tag_template: "v{{ Version }}"

  # --- Tier 2: stage crates (depend on core) ---
  # All inherit defaults.publish.cargo = {} (DEC-9). No per-crate publish block
  # required — each opts in via the inherited cargo publisher slot.
  - name: anodizer-stage-build
    path: crates/stage-build
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-archive
    path: crates/stage-archive
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-nfpm
    path: crates/stage-nfpm
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-checksum
    path: crates/stage-checksum
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-changelog
    path: crates/stage-changelog
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-release
    path: crates/stage-release
    tag_template: "v{{ Version }}"
    # Real Cargo.toml deps: anodizer-core, anodizer-stage-checksum.
    # Anodizer's cargo publisher topologically sorts on this list, so
    # missing entries cause "no matching package" failures when an
    # alphabetically-earlier crate is published before its dep.
    depends_on: [anodizer-core, anodizer-stage-checksum]
  - name: anodizer-stage-publish
    path: crates/stage-publish
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-release]
  - name: anodizer-stage-docker
    path: crates/stage-docker
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-sign
    path: crates/stage-sign
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-announce
    path: crates/stage-announce
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-publish]
  - name: anodizer-stage-source
    path: crates/stage-source
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-upx
    path: crates/stage-upx
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-snapcraft
    path: crates/stage-snapcraft
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-dmg
    path: crates/stage-dmg
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-msi
    path: crates/stage-msi
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-pkg
    path: crates/stage-pkg
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-blob
    path: crates/stage-blob
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-nsis
    path: crates/stage-nsis
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-appbundle
    path: crates/stage-appbundle
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-flatpak
    path: crates/stage-flatpak
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-notarize
    path: crates/stage-notarize
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-templatefiles
    path: crates/stage-templatefiles
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-makeself
    path: crates/stage-makeself
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-srpm
    path: crates/stage-srpm
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-sbom
    path: crates/stage-sbom
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-attest
    path: crates/stage-attest
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-checksum, anodizer-stage-sign]
  - name: anodizer-stage-appimage
    path: crates/stage-appimage
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core]
  - name: anodizer-stage-verify-release
    path: crates/stage-verify-release
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-release]
  - name: anodizer-stage-prepublish-guard
    path: crates/stage-prepublish-guard
    tag_template: "v{{ Version }}"
    depends_on: [anodizer-core, anodizer-stage-publish, anodizer-stage-announce]

  # --- Tier 3: CLI binary (depends on all stages) ---
  - name: anodizer
    path: crates/cli
    tag_template: "v{{ Version }}"
    depends_on:
      - anodizer-core
      - anodizer-stage-build
      - anodizer-stage-archive
      - anodizer-stage-nfpm
      - anodizer-stage-checksum
      - anodizer-stage-changelog
      - anodizer-stage-release
      - anodizer-stage-publish
      - anodizer-stage-docker
      - anodizer-stage-sign
      - anodizer-stage-announce
      - anodizer-stage-source
      - anodizer-stage-upx
      - anodizer-stage-snapcraft
      - anodizer-stage-dmg
      - anodizer-stage-msi
      - anodizer-stage-pkg
      - anodizer-stage-blob
      - anodizer-stage-nsis
      - anodizer-stage-appbundle
      - anodizer-stage-flatpak
      - anodizer-stage-notarize
      - anodizer-stage-templatefiles
      - anodizer-stage-makeself
      - anodizer-stage-srpm
      - anodizer-stage-sbom
      - anodizer-stage-attest
      - anodizer-stage-appimage
      - anodizer-stage-verify-release
      - anodizer-stage-prepublish-guard
    builds:
      # GNU build — feeds archives + deb + rpm. Inherits defaults.targets
      # (the six gnu/darwin/msvc triples). The hermetic glibc floor
      # (verify_release.glibc_ceiling) and Debian/RHEL portability ride on it.
      - id: anodizer
        binary: anodizer
        features: []
        no_default_features: false
      # musl build — feeds the apk ONLY. apk ships on Alpine (musl); a glibc
      # binary EXITs 127 there. `targets:` REPLACES defaults.targets, so this
      # build compiles ONLY the two musl triples via cargo-zigbuild.
      - id: anodizer-musl
        binary: anodizer
        features: []
        no_default_features: false
        targets:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    universal_binaries:
      # Merge the two darwin builds of `id: anodizer` (x86_64 + aarch64) into a
      # single fat macOS binary via lipo. `replace: false` keeps the per-arch
      # archives alongside the universal one.
      - id: anodizer
        ids: [anodizer]
        replace: false
        mod_timestamp: "{{ CommitTimestamp }}"
    dockers_v2:
      # Bind to the GNU build. Docker stages binaries into a per-platform dir
      # by Os/Arch match; gnu and musl x86_64 both match linux/amd64 and copy
      # to the same dest path (last-writer-wins). The image is glibc
      # (distroless cc-debian12), so it must stage the gnu binary.
      - id: anodizer
        ids: [anodizer]
        dockerfile: Dockerfile
        # Same buildx invocation pushes every tag to BOTH registries. The
        # private k3s registry mirrors the public ghcr image so internal
        # consumers pull from inside the cluster without egress. The runner
        # must already be `docker login`-ed to registry.jarvispro.io before
        # the docker stage runs (anodizer drives buildx but does not log in).
        images:
          - ghcr.io/tj-smith47/anodizer
          - registry.jarvispro.io/anodizer
        labels:
          io.modelcontextprotocol.server.name: io.github.tj-smith47/anodizer
          io.artifacthub.package.readme-url: "https://raw.githubusercontent.com/tj-smith47/anodizer/master/README.md"
          io.artifacthub.package.logo-url: "https://raw.githubusercontent.com/tj-smith47/anodizer/master/assets/logo.png"
          io.artifacthub.package.maintainers: '[{"name":"TJ Smith","email":"tj@jarvispro.io"}]'
          io.artifacthub.package.license: "{{ Metadata.License }}"
        tags:
          - "{{ .Version }}"
          - latest
        platforms:
          - linux/amd64
          - linux/arm64
    archives:
      # `formats: [tar.gz]` mirrors the defaults identity key so this entry
      # deep-merges with the defaults archive (picking up format_overrides)
      # rather than appearing as a second entry.
      - name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
        formats: [tar.gz]
        # Bind to the GNU build only. Without this, archives auto-collect ALL
        # builds; the musl x86_64 binary maps to the same linux/amd64 name as
        # the gnu one and the two archives collide on the same output filename.
        ids: [anodizer]
        # Pins archive-member owner/group/mtime so the tar is byte-reproducible
        # regardless of build wall-clock.
        builds_info:
          owner: root
          group: root
          mtime: "{{ CommitDate }}"
        files:
          - LICENSE-MIT
          - LICENSE-APACHE
          - README.md
          - docs/site/content/docs/reference/configuration.md
          - dist/anodizer.1
      # Second archive entry exercises tar.xz / tar.zst on unix and tgz on
      # windows. Name suffix `-extra` keeps outputs from colliding with the
      # primary entry above.
      - id: extra
        name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-extra"
        ids: [anodizer]
        # Pins archive-member owner/group/mtime so the tar is byte-reproducible
        # regardless of build wall-clock.
        builds_info:
          owner: root
          group: root
          mtime: "{{ CommitDate }}"
        formats: [tar.xz, tar.zst]
        format_overrides:
          - os: windows
            formats: [tgz]
        files:
          - LICENSE-MIT
          - LICENSE-APACHE
          - README.md
    # Inherit the top-level combined `*_checksums.txt` (GoReleaser's default).
    # Per-artifact split sidecars would emit one `.sha256` per asset AND, via
    # `signs.artifacts: checksum`, one detached `.sig` per sidecar — ~114 tiny
    # release assets that trip GitHub's secondary rate limit. Combined mode is
    # one checksums file + one signature; scoop autoupdate auto-resolves to
    # `ChecksumsRegex` (see resolve_autoupdate_hash) so nothing downstream breaks.
    binstall:
      # Auto-derived: anodize renders a per-target `overrides.<triple>` for every
      # build target from this crate's own archive `name_template` + release repo,
      # so the cargo-binstall `pkg_url` always matches the asset the release
      # uploads. No hand-written `pkg_url`/`overrides` needed (supply either to
      # take full manual control).
      enabled: true
    release:
      github:
        owner: tj-smith47
        name: anodizer
      draft: false
      prerelease: auto
      make_latest: auto
      mode: keep-existing
      target_commitish: "{{ .Commit }}"
      discussion_category_name: "Announcements"
      replace_existing_draft: true
      replace_existing_artifacts: true
      name_template: "{{ ProjectName }} {{ Tag }}"
      header: |
        ## What's new in {{ .Tag }}
      footer: |
        ---
        **Full Changelog**: https://github.com/tj-smith47/anodizer/compare/{{ PreviousTag }}...{{ Tag }}
        Released with [anodizer](https://github.com/tj-smith47/anodizer) 🦀
      include_meta: true
      # Attach the apk-signing public key alongside the signed apk(s).
      # anodizer-action's `apk-private-key` input derives the pub key from
      # the private key and drops it into ./dist/. apk verifiers install
      # this file under /etc/apk/keys/ before `apk add`-ing a signed
      # package. `allow_empty: true` skips the key glob silently when no
      # secret was provisioned (local snapshot / dry-run flows). The man
      # page glob deliberately has no `allow_empty`: before.hooks always
      # generates dist/anodizer.1, so its absence is a pipeline defect
      # that must fail the release.
      extra_files:
        - glob: "dist/*-apk-signing-key.rsa.pub"
          allow_empty: true
        - glob: "dist/anodizer.1"
    publish:
      # `cargo:` inherits from defaults.publish.cargo (= {} → presence-as-opt-in).
      # Other publishers below are CLI-only, so they live per-crate.
      # Homebrew is handled exclusively via the top-level `homebrew_casks:` block.
      scoop:
        required: true
        repository:
          owner: tj-smith47
          name: scoop-bucket
        ids:
          - default
        depends:
          - git
        shortcuts:
          - ["anodizer.exe", "Anodizer"]
        commit_msg_template: "anodizer {{ .Tag }}"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
      chocolatey:
        # Disabled: chocolatey's moderation queue + recurring 403s stall the
        # multi-publisher ship while every other registry succeeds. Re-enable
        # once the registry-side moderation issue is resolved.
        skip: true
        required: true
        repository:
          owner: tj-smith47
          name: anodizer
        # Title must differ from the package id (cpmr0050: TitleNotSameAsPackageId).
        title: "Anodizer Release Automation"
        summary: "A Rust-native release automation tool"
        authors: "TJ Smith"
        owners: "tj-smith47"
        copyright: "Copyright © 2026 TJ Smith"
        require_license_acceptance: false
        project_url: "https://github.com/tj-smith47/anodizer"
        # projectSourceUrl must point at software source AND differ from
        # projectUrl (cpmr0041). Derivation defaults it to the repo root ==
        # projectUrl, which trips the guideline; pin it to the source tree at
        # the release tag instead.
        project_source_url: "https://github.com/tj-smith47/anodizer/tree/{{ .Tag }}"
        package_source_url: "https://github.com/tj-smith47/anodizer/tree/{{ .Tag }}/crates/cli"
        # Dual-licensed (MIT OR Apache-2.0) → no single canonical LICENSE file,
        # so the tool omits a derived <licenseUrl>. Point at the README's
        # License section (documents both), pinned to the release tag so the
        # link is immutable per version.
        license_url: "https://github.com/tj-smith47/anodizer/blob/{{ .Tag }}/README.md#license"
        docs_url: "https://tj-smith47.github.io/anodizer/docs/reference/configuration/"
        bug_tracker_url: "https://github.com/tj-smith47/anodizer/issues"
        release_notes: "https://github.com/tj-smith47/anodizer/releases/tag/{{ .Tag }}"
        icon_url: "https://raw.githubusercontent.com/tj-smith47/anodizer/master/assets/logo.png"
        tags:
          - release
          - automation
          - rust
        # Rust/MSVC binaries dynamically link the VC++ 2015+ runtime; without
        # this the portable exe dies at invocation with STATUS_DLL_NOT_FOUND
        # (-1073741515). Mirrors the winget VCRedist dependency below.
        dependencies:
          - id: "vcredist140"
        republish_in_moderation: true
      winget:
        required: true
        repository:
          owner: tj-smith47
          name: winget-pkgs
        short_description: "Rust-native release automation"
        author: "TJ Smith"
        copyright: "Copyright © 2026 TJ Smith"
        package_identifier: "TJSmith.Anodizer"
        publisher: "TJ Smith"
        publisher_url: "https://github.com/tj-smith47"
        publisher_support_url: "https://github.com/tj-smith47/anodizer/issues"
        release_notes: "See release-notes URL for the full changelog."
        release_notes_url: "https://github.com/tj-smith47/anodizer/releases/tag/{{ .Tag }}"
        installation_notes: "Run `anodizer --help` after installation."
        documentations:
          - label: "Documentation"
            url: "https://tj-smith47.github.io/anodizer"
          - label: "Source"
            url: "https://github.com/tj-smith47/anodizer"
        # Portable-zip tool: `install` (overlay the new version) is correct;
        # there is no installer-managed prior version to uninstall first.
        upgrade_behavior: install
        tags:
          - release
          - automation
          - rust
        commit_msg_template: "anodizer {{ .Tag }}"
        # Rust/MSVC binaries dynamically link against the VC++ 2015+
        # runtime. Without this dependency declared, winget's automated
        # validation fails at invocation time with STATUS_DLL_NOT_FOUND
        # (exit code -1073741515).
        dependencies:
          - package_identifier: "Microsoft.VCRedist.2015+.x64"
            architectures: ["x64"]
          - package_identifier: "Microsoft.VCRedist.2015+.arm64"
            architectures: ["arm64"]
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
        update_existing_pr: true
      aur:
        required: true
        git_url: "ssh://aur@aur.archlinux.org/anodizer-bin.git"
        name: anodizer-bin
        # Rendered as the PKGBUILD `# Maintainer:` header line(s).
        maintainers:
          - "TJ Smith <tj@jarvispro.io>"
        depends:
          - glibc
        # Binary-only package(): anodizer's archive bundles LICENSE-MIT,
        # LICENSE-APACHE, and README only (no completions/man), so there is
        # nothing extra to install here. To ship completions+man on AUR, bundle
        # them into the archive stage first.
        private_key: "{{ .Env.AUR_SSH_KEY }}"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
      nix:
        required: true
        name: anodizer
        repository:
          owner: tj-smith47
          name: nix-pkgs
        # meta.changelog — links the GitHub Releases history into the derivation.
        changelog: "https://github.com/tj-smith47/anodizer/releases"
        # meta.longDescription — the expanded blurb nixpkgs shows on search.
        long_description: |
          Anodizer is a Rust-native release-automation tool: it builds, archives,
          packages, signs, and publishes Rust binaries in one deterministic
          pipeline. It mirrors GoReleaser's behavior (OSS and Pro) while adding
          Rust-first conveniences, and produces signed releases across crates.io,
          Homebrew, Scoop, winget, AUR, Nix, and OCI registries.
        # meta.maintainers — nixpkgs maintainer handle(s).
        maintainers:
          - tj-smith47
        skip_upload: false
        formatter: alejandra
        extra_install: |
          installManPage share/man/man1/anodizer.1
        post_install: |
          echo "Installed anodizer. Run 'anodizer init' to scaffold a config."
        commit_msg_template: "anodizer {{ .Tag }}"
        commit_author:
          name: TJ Smith
          email: tj@jarvispro.io
    nfpm:
      # deb + rpm packers — bound to the GNU build (`ids: [anodizer]`). deb
      # (Debian/Ubuntu) and rpm (RHEL/Fedora/SUSE) ship glibc; the hermetic
      # glibc floor (verify_release.glibc_ceiling) keeps these portable.
      - id: default
        package_name: anodizer
        ids:
          - anodizer
        formats:
          - deb
          - rpm
        vendor: "TJ Smith"
        maintainer: "TJ Smith <tj@jarvispro.io>"
        bindir: /usr/bin
        section: utils
        priority: optional
        epoch: "1"
        release: "1"
        umask: "0o002"
        mtime: "{{ CommitDate }}"
        recommends:
          - git
        suggests:
          - upx
        file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
        contents:
          - src: LICENSE-MIT
            dst: /usr/share/doc/anodizer/LICENSE-MIT
          - src: LICENSE-APACHE
            dst: /usr/share/doc/anodizer/LICENSE-APACHE
          - src: README.md
            dst: /usr/share/doc/anodizer/README.md
          - src: dist/anodizer.1
            dst: /usr/share/man/man1/anodizer.1
            file_info:
              mode: 0644
              mtime: "{{ CommitDate }}"
        # Refresh the man index post-install. Also dogfooding: a lifecycle
        # script makes the determinism harness exercise the nfpm script-mtime
        # pin on anodizer's OWN packages — the path a script-less package never
        # covers, which is how apk script-mtime drift reached a consumer before
        # it could fail here. The script is ALSO executed live by the
        # verify-release `install_smoke` gate (it runs the real installer in a
        # container), so it must stay install-safe — keep it best-effort and
        # exit 0.
        scripts:
          postinstall: packaging/nfpm/postinstall.sh
        # Package signing uses two distinct key materials:
        #   * GPG_KEY_PATH         -> GPG-armored secret key, consumed by deb
        #                             (dpkg-sig) and rpm (rpmsign).
        #   * APK_PRIVATE_KEY_PATH -> raw PEM RSA private key, consumed by
        #                             nfpm's apk packager (RSA-PSS, not OpenPGP).
        # Requires `GPG_KEY_PATH` env pointing at an exported secret key file:
        #   gpg --export-secret-keys --armor <fingerprint> > ~/.gnupg/anodizer-signing.asc
        #   export GPG_KEY_PATH=~/.gnupg/anodizer-signing.asc
        # Same key material as `signs:` (which uses keyring lookup via fingerprint);
        # nfpm-side tools (rpmsign / dpkg-sig) need a file path on disk.
        deb:
          # A static Rust binary trips lintian's statically-linked-binary tag,
          # and a native deb without a changelog file trips
          # changelog-file-missing-in-native-package.
          lintian_overrides:
            - statically-linked-binary
            - changelog-file-missing-in-native-package
          signature:
            key_file: "{{ .Env.GPG_KEY_PATH }}"
            type: origin
        rpm:
          group: Development/Tools
          packager: "TJ Smith <tj@jarvispro.io>"
          signature:
            key_file: "{{ .Env.GPG_KEY_PATH }}"
      # apk packer — bound to the musl build (`ids: [anodizer-musl]`). apk
      # installs on Alpine, which ships musl libc; a glibc binary EXITs 127
      # there. Splitting apk into its own config (musl) while deb/rpm stay
      # glibc preserves the glibc floor for the portable formats.
      - id: apk
        package_name: anodizer
        ids:
          - anodizer-musl
        formats:
          - apk
        vendor: "TJ Smith"
        maintainer: "TJ Smith <tj@jarvispro.io>"
        bindir: /usr/bin
        section: utils
        priority: optional
        epoch: "1"
        release: "1"
        umask: "0o002"
        mtime: "{{ CommitDate }}"
        recommends:
          - git
        suggests:
          - upx
        file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
        contents:
          - src: LICENSE-MIT
            dst: /usr/share/doc/anodizer/LICENSE-MIT
          - src: LICENSE-APACHE
            dst: /usr/share/doc/anodizer/LICENSE-APACHE
          - src: README.md
            dst: /usr/share/doc/anodizer/README.md
          - src: dist/anodizer.1
            dst: /usr/share/man/man1/anodizer.1
            file_info:
              mode: 0644
              mtime: "{{ CommitDate }}"
        # Same postinstall as deb/rpm — load-bearing here: this is the SIGNED apk
        # whose script-mtime drift the determinism harness must now catch on
        # anodizer's own release (see the deb/rpm entry for the full rationale).
        scripts:
          postinstall: packaging/nfpm/postinstall.sh
        apk:
          signature:
            # apk-tools uses its own RSA-PSS scheme, not OpenPGP. nfpm's apk
            # packager parses the key via Go's `pem.Decode`, so the file at
            # this path must be a raw PEM RSA private key, not the GPG-armored
            # `-----BEGIN PGP PRIVATE KEY BLOCK-----` deb / rpm consume.
            # Provisioned by the `apk-private-key` step in anodizer-action,
            # which writes the `APK_PRIVATE_KEY` repo secret to a temp file
            # and derives the matching public key alongside.
            key_file: "{{ .Env.APK_PRIVATE_KEY_PATH }}"
    snapcrafts:
      # Bind to the GNU build. snapcraft groups binaries by Os/Arch, and
      # map_target collapses both gnu and musl x86_64 to linux/amd64 — without
      # this bind the musl binary renders the same anodizer_<ver>_linux_amd64
      # .snap and clobbers (last-writer-wins). The snap is glibc (core24 base),
      # so it must ship the gnu binary.
      - id: default
        ids: [anodizer]
        name: anodizer
        title: "anodizer"
        # icon: omitted intentionally — Snap Store snap.json validation
        # rejects the `icon` field with "Additional properties are not
        # allowed". snapcraft pack still emits a valid snap, but upload
        # fails. Place the icon at snap/gui/icon.png in the project tree
        # instead (the recommended path that doesn't end up in snap.json).
        base: core24
        summary: "A Rust-native release automation tool"
        description: |
          Anodizer is a release automation tool for Rust projects, inspired by
          GoReleaser. It handles building, packaging, publishing, and announcing
          releases across multiple platforms and package managers.
        grade: stable
        # Interim: classic is what anodizer needs (it execs host cargo/docker/
        # gpg, which a confined sandbox blocks), but classic uploads require a
        # one-time Snap Store manual review that isn't granted yet. strict uploads
        # without review but sandboxes those execs — a snap that installs but
        # can't run a release. devmode runs unconfined so the tool actually works
        # and still uploads without review; the Store only permits devmode on
        # beta/edge, hence latest/beta. Restore `confinement: classic` +
        # `latest/stable` once the store-request for the `anodizer` classic snap
        # is approved.
        confinement: devmode
        license: MIT
        publish: true
        channel_templates:
          - "latest/beta"
        apps:
          anodizer:
            command: anodizer
            plugs:
              - home
              - network
              - network-bind
    flatpaks:
      # The Flatpak analog of the classic-confinement snap above: anodizer is a
      # release CLI that, once installed, execs the host's cargo/git/docker/
      # cosign/gpg against the user's project. Strict Flatpak sandboxing blocks
      # all of that, so these finish_args open the same broad host surface the
      # classic snap relies on — each is load-bearing, not a toy bundle:
      #   --share=network            registry/git/notary I/O (cargo publish, gh)
      #   --share=ipc                X11/dbus shared-memory many host tools use
      #   --filesystem=host          read .git + write dist/ in the user's repo
      #   --device=all               host devices (e.g. /dev/fuse for AppImage,
      #                              tty for interactive gpg pinentry)
      #   --talk-name=org.freedesktop.Flatpak  lets the sandboxed binary call
      #                              `flatpak-spawn --host cargo/docker/...` to
      #                              reach the host toolchains it orchestrates
      #   --allow=devel              ptrace/perf needed by some build toolchains
      #
      # Bind to the GNU build (`ids: [anodizer]`), exactly like snapcrafts
      # above: the gnu and musl builds both collapse to the `x86_64`/`aarch64`
      # Flatpak arch, so without this filter two builds render the same bundle
      # and clobber each other's work dir. The runtime is glibc-based
      # (org.freedesktop.Platform), so the gnu binary is the correct one to ship.
      - ids: [anodizer]
        app_id: io.github.tj_smith47.Anodizer
        runtime: org.freedesktop.Platform
        runtime_version: "24.08"
        sdk: org.freedesktop.Sdk
        command: anodizer
        finish_args:
          - "--share=network"
          - "--share=ipc"
          - "--filesystem=host"
          - "--device=all"
          - "--talk-name=org.freedesktop.Flatpak"
          - "--allow=devel"
    # macOS .app bundle — pure file assembly (no external tool), so it builds on
    # Linux CI. Info.plist is auto-generated from bundle/name/version + min_os.
    # UNSIGNED: a signed bundle additionally needs an Apple Developer ID
    # Application cert (codesign); that cert is paid and stays unconfigured.
    app_bundles:
      - id: anodizer
        ids: [anodizer]
        name: "{{ .ProjectName }}_{{ .Arch }}"
        bundle: io.github.tj-smith47.anodizer
        icon: assets/logo.png
        min_os_version: "10.13"
        replace: false
        mod_timestamp: "{{ CommitTimestamp }}"
    # macOS .dmg disk image — uses hdiutil on macOS, falls back to genisoimage on
    # Linux CI (preinstalled in the base image). Images the matching per-arch .app
    # so the DMG carries a drag-to-Applications layout.
    dmgs:
      - id: anodizer
        ids: [anodizer]
        name: "{{ .ProjectName }}_{{ .Arch }}"
        use: appbundle
        volume_name: "{{ .ProjectName }} {{ .Version }}"
        replace: false
        mod_timestamp: "{{ CommitTimestamp }}"
    # macOS .pkg installer — uses pkgbuild on macOS, falls back to the Linux flat
    # XAR toolchain (xar + mkbom + cpio + gzip, preinstalled in the base image)
    # on CI. UNSIGNED: a signed/notarized pkg needs an Apple Developer ID
    # Installer cert (productsign) + notarytool credentials; both are paid.
    pkgs:
      - id: anodizer
        ids: [anodizer]
        identifier: io.github.tj-smith47.anodizer
        name: "{{ .ProjectName }}_{{ .Arch }}"
        install_location: /usr/local/bin
        min_os_version: "10.13"
        replace: false
        mod_timestamp: "{{ CommitTimestamp }}"
    # Windows .msi installer — built natively on the Windows determinism shard
    # (the shard that holds the windows-msvc payload binary) with WiX v3
    # (candle + light). The .wxs below is WiX v3 dialect (2006/wi namespace);
    # the explicit `version: v3` makes that toolchain choice unambiguous to both
    # stage-msi (which would otherwise derive v3 by sniffing the .wxs namespace)
    # and the action's dialect-aware auto-install (which provisions candle+light
    # via the wixtoolset choco package on the Windows shard). UNSIGNED: a signed
    # MSI needs a Windows Authenticode code-signing cert (signtool); that cert
    # is paid.
    msis:
      - id: anodizer
        ids: [anodizer]
        wxs: packaging/anodizer.wxs
        version: v3
        name: "{{ .ProjectName }}_{{ .Arch }}"
        replace: false
        mod_timestamp: "{{ CommitTimestamp }}"
    # Windows .exe installer (NSIS) — built natively on the Windows determinism
    # shard via makensis (provisioned by the action's auto-install). makensis is
    # cross-platform and
    # honors SOURCE_DATE_EPOCH, so the installer is byte-reproducible (GATED in
    # the determinism harness). Uses the authored script below (Start Menu
    # shortcut + Add/Remove Programs entry). UNSIGNED: a signed installer needs
    # a Windows Authenticode cert (signtool).
    nsis:
      - id: anodizer
        ids: [anodizer]
        script: packaging/anodizer.nsi
        name: "{{ .ProjectName }}_{{ .Arch }}-setup"
        replace: false
        mod_timestamp: "{{ CommitTimestamp }}"
    blobs:
      - required: true
        provider: s3
        bucket: anodizer-releases
        endpoint: "{{ Env.MINIO_ENDPOINT }}"
        region: us-east-1
        s3_force_path_style: true
        disable_ssl: true
        directory: "{{ Tag }}"

# Top-level Homebrew Cask publisher — GR v2.16+ supported path.
# GoReleaser v2.16 fully deprecated `brews:` (Formula). This block uses the
# structured `homebrew_casks:` surface, which unlocks completions, manpages,
# binaries, caveats, uninstall, and zap as first-class fields instead of raw
# Ruby strings in post_install.
homebrew_casks:
  - required: true
    repository:
      owner: tj-smith47
      name: homebrew-tap
    directory: Casks
    ids:
      - default
    # Installs the CLI binary as a Homebrew Cask binary stub.
    binaries:
      - anodizer
    # Shell completions are runtime-generated by the binary itself; no pre-built
    # completion files are emitted by the build pipeline (before.hooks only
    # produces dist/anodizer.1). generate_completions_from_executable instructs
    # Homebrew to call `anodizer completion <shell>` at cask install time.
    generate_completions_from_executable:
      executable: anodizer
      args:
        - completion
      base_name: anodizer
      shells:
        - bash
        - zsh
        - fish
    # Manpage produced by `before.hooks` → `dist/anodizer.1`, attached to the
    # GitHub Release as an extra_file; Homebrew downloads it from the release.
    manpages:
      - anodizer.1
    caveats: |
      Run `anodizer init` to scaffold a config in your repo.
    # `verified:` asserts the download host so Homebrew skips the
    # interactive "unverified cask" prompt; the download URL itself stays
    # derived (no `template:` here), so the cask still emits `url :url`.
    url:
      verified: "github.com/tj-smith47/anodizer/releases/download"
    # Active version detection: anodizer tags releases on GitHub, so
    # `github_latest` against the cask's own `url` stanza (`url :url`, the
    # idiomatic cask shorthand) lets `brew livecheck` poll the latest tag.
    # This dogfoods the cask `livecheck` field — the single Homebrew surface
    # anodizer publishes is this cask; no Formula is emitted.
    livecheck:
      strategy: github_latest
      url: url
    dependencies:
      - formula: git
    commit_msg_template: "anodizer {{ .Tag }}"
    commit_author:
      name: TJ Smith
      email: tj@jarvispro.io

schemastore:
  retain_on_rollback: true  # external catalog — retain even if a downstream publisher fails
  repository:
    owner: tj-smith47
    name: schemastore
  schemas:
    - name: Anodizer  # title-case to match the live SchemaStore catalog entry (uniqueness is by fileMatch, not name)
      required: true
      description: "Anodizer Rust release-automation configuration file"
      file_match: [".anodizer.yaml", ".anodizer.yml"]
      url: "https://tj-smith47.github.io/anodizer/schema.json"

notarize:
  skip: true  # disabled — no Apple Developer credentials configured

template_files:
  - id: install-script
    src: scripts/install.sh.tpl
    dst: install.sh
    mode: "0755"

changelog:
  use: git
  title: "Changelog"
  header: "# Changelog for {{ ProjectName }}"
  divider: "---"
  sort: asc
  abbrev: 12
  format: "* {{ .SHA }} {{ .Message }} ({{ .AuthorUsername }})"
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^build"
      - "^test"
      - "^revert"
      - "^chore\\(deps\\)"
      - "^Merge "
      - "Merge pull request"
      - "Merge branch"
      - "Merge remote-tracking branch"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Security
      regexp: "^sec"
      order: 1
    - title: Bug Fixes
      regexp: "^(fix|refactor)"
      order: 2
    - title: Performance
      regexp: "^perf"
      order: 3
    - title: Others
      order: 999
  footer: |
    _Generated by anodizer._

signs:
  - id: default
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
    # IsSnapshot / IsHarness are real bools: sign in release mode, and inside
    # the determinism harness (which provisions its own ephemeral keys).
    if: "{{ not IsSnapshot or IsHarness }}"

source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  prefix_template: "{{ ProjectName }}-{{ Version }}/"
  files:
    - "crates/**/*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
    - "LICENSE-MIT"
    - "LICENSE-APACHE"
    - "README.md"

sboms:
  # Built-in CycloneDX from Cargo.lock — omit `cmd`/`args` to opt out of
  # syft. Built-in emits an SDE-pinned timestamp and a project-derived
  # deterministic serialNumber, so every run produces byte-identical SBOMs.
  - id: default
    documents:
      - "{{ .ArtifactName }}.cdx.json"
    artifacts: archive

upx:
  - id: default
    enabled: true
    binary: upx
    # Bind to the GNU build. The `targets:` list below already excludes musl,
    # but `ids:` makes the exclusion explicit and drift-proof: a future edit
    # adding a musl triple to `targets:` would otherwise silently compress the
    # apk's musl binary (UPX can corrupt musl-static binaries).
    ids: [anodizer]
    args:
      - "--best"
      - "--lzma"
    compress: "9"
    lzma: true
    # UPX doesn't support macOS ARM or Windows ARM binaries
    targets:
      - "x86_64-unknown-linux-gnu"
      - "aarch64-unknown-linux-gnu"
      - "x86_64-apple-darwin"
      - "x86_64-pc-windows-msvc"

nightly:
  name_template: "{{ ProjectName }}-nightly"
  tag_name: nightly
  publish_release: true
  keep_single_release: true

snapshot:
  version_template: "{{ Tag | trimprefix(prefix='v') }}-SNAPSHOT-{{ ShortCommit }}"

# Split/merge CI configuration for fan-out builds
partial:
  by: os

# Binary-level signing (separate from archive/checksum signing above)
binary_signs:
  - id: default
    artifacts: binary
    cmd: cosign
    args:
      - "sign-blob"
      - "--key=env://COSIGN_KEY"
      - "--bundle={{ Signature }}"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    # Sign in release mode, and inside the determinism harness (ephemeral keys).
    if: "{{ not IsSnapshot or IsHarness }}"

# Docker image signing
docker_signs:
  - id: default
    artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "--key=env://COSIGN_KEY"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    # Sign in release mode, and inside the determinism harness (ephemeral keys).
    if: "{{ not IsSnapshot or IsHarness }}"

# Milestone closing — close GitHub milestones matching the release tag
milestones:
  - repo:
      owner: tj-smith47
      name: anodizer
    close: false  # no milestones exist yet; flip once one is created
    fail_on_error: true
    name_template: "{{ Tag }}"

# DockerHub description sync — NOT image publishing (images go to ghcr.io +
# registry.jarvispro.io via dockers_v2:). This syncs the repo
# description/README to hub.docker.com so users who find the image there see
# accurate docs. Requires an EXISTING DockerHub repo at tj-smith47/anodizer
# and the DOCKER_PASSWORD secret (the default env var the dockerhub publisher
# reads; username falls back to DOCKER_USERNAME if unset).
dockerhub:
  # full_description points at the same README.md the archives/release notes
  # ship, so the hub.docker.com page can never drift from the repo README.
  - required: false
    username: tsmthtj
    images:
      - tsmthtj/anodizer
    description: "Rust release tooling — drop-in GoReleaser parity + Rust extras."
    full_description:
      from_file:
        path: README.md

# Artifactory upload configurations
artifactories:
  - name: production
    skip: true  # disabled — no Artifactory instance
    target: "https://artifactory.example.com/generic-local/anodizer/{{ Tag }}/"
    method: PUT

# CloudSmith publisher
cloudsmiths:
  - required: true
    organization: jarvispro
    repository: anodizer
    formats: [deb, rpm, alpine]
    distributions:
      deb: any-distro/any-version
      rpm: any-distro/any-version
      alpine: alpine/any-version
    republish: true  # prevents MD5 conflict when re-cutting a version

# GemFury publisher — pushes the same nfpm deb/rpm/apk artifacts CloudSmith
# gets to https://push.fury.io/<account>, giving users an `apt`/`yum`/`apk`
# source hosted on fury.io. Push auth reads FURY_PUSH_TOKEN (HTTP Basic username,
# empty password); rollback DELETE reads FURY_API_TOKEN. `required: true` is
# the publisher default (reversible via the delete API) but stated explicitly
# so a failed push aborts rather than half-releasing.
gemfury:
  - id: fury
    account: tj-smith47
    required: true
    formats: [apk, deb, rpm]

# Generic HTTP PUT upload — mirrors the release archives + checksums to a
# self-hosted artifact host on jarvispro.io. The upload publisher resolves
# credentials per-entry: rendered `username`/`password` template → the
# UPLOAD_<NAME>_USERNAME / UPLOAD_<NAME>_SECRET env vars (NAME upper-cased,
# `-`→`_`). With name=jarvispro the env keys are UPLOAD_JARVISPRO_USERNAME
# and UPLOAD_JARVISPRO_SECRET; the {{ .Env.* }} templates below point the
# config-side cascade at exactly those vars so there is one source of truth.
uploads:
  - name: jarvispro
    # Only the CLI archives (build id=anodizer); the `extra`-id archives and
    # other builds are excluded.
    ids: [anodizer]
    # Archives (tar.gz / zip) plus their .sha256 checksum sidecars.
    exts: [tar.gz, zip, sha256]
    # Per-version prefix; the artifact name is appended to this target
    # (custom_artifact_name=false keeps the default append behaviour). The
    # endpoint is the api-server ClusterIP Service, reached in-cluster from the
    # release runner (same as MinIO) — plain http is fine because the traffic
    # never leaves the pod network and is never exposed via Traefik/Cloudflare.
    target: "http://api-server.jarvispro.svc.cluster.local:8478/anodizer/{{ .Version }}/"
    method: PUT
    mode: archive
    username: "{{ .Env.UPLOAD_JARVISPRO_USERNAME }}"
    password: "{{ .Env.UPLOAD_JARVISPRO_SECRET }}"
    custom_artifact_name: false
    # Server-side integrity check: send the artifact's SHA256 in a header the
    # endpoint can compare against the received body.
    checksum_header: X-Checksum-Sha256
    # Include the checksum sidecars and detached signatures in the upload set
    # so the mirror is self-verifying; metadata JSON stays out.
    checksum: true
    signature: true
    meta: false
    custom_headers:
      X-Anodizer-Project: "{{ .ProjectName }}"
      X-Anodizer-Tag: "{{ .Tag }}"
    # Mirroring is pointless for throwaway snapshot builds.
    skip: "{{ .IsSnapshot }}"
    # Only mirror real tagged releases (defence-in-depth alongside `skip`).
    if: "{{ not .IsSnapshot }}"

# Generic custom publisher — pushes the release archives + checksums to the
# user's MinIO bucket via the MinIO client (`mc`). Authentication is the `mc`
# alias config in ~/.mc/config.json (HOME is on the user-command env
# whitelist, so `mc` reads its own config); no secret is spliced into argv or
# the env. Each entry runs the cmd once per matching artifact with
# ArtifactPath / ArtifactName / Tag bound as template vars.
publishers:
  - name: minio-mirror
    # Self-provision the `jarvispro` mc alias from the S3 credentials the
    # blobs stage already consumes (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY,
    # injected into the in-cluster runner alongside the blob publisher), then
    # copy. `mc alias set` is used instead of an MC_HOST_<alias> URL so secret
    # keys with URL-reserved characters are handled correctly. The endpoint is
    # the in-cluster MinIO Service (same one the blobs publisher targets).
    cmd: sh
    args:
      - -ec
      - |
        mc alias set jarvispro "http://minio.jarvispro.svc.cluster.local:9003" \
          "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" >/dev/null
        mc cp --quiet "{{ .ArtifactPath }}" \
          "jarvispro/anodizer-releases/{{ .Tag }}/{{ .ArtifactName }}"
    # Only the CLI archives (build id=anodizer).
    ids: [anodizer]
    # Restrict to archive + checksum kinds; archives match the default
    # curated set, checksums are opted in via `checksum: true` below.
    artifact_types: [archive, checksum]
    checksum: true
    signature: false
    meta: false
    # Keep mc's config (the alias written above) in a writable per-run dir.
    env:
      - "MC_CONFIG_DIR={{ .Env.HOME }}/.mc"
    dir: dist
    # Skip on snapshot builds — no point pushing throwaway artifacts.
    skip: "{{ .IsSnapshot }}"
    if: "{{ not .IsSnapshot }}"

# NPM registry publisher — ships a metapackage + per-platform packages so
# `npm install -g anodizer` works for JS toolchain users (the
# biome / git-cliff pattern).
#
# Auth is npm Trusted Publishing (tokenless OIDC): under GitHub Actions with
# id-token: write, npm CLI >= 11.5.1 / Node >= 22.14.0 exchanges the OIDC token
# for a short-lived publish credential once a Trusted Publisher is configured on
# npmjs.com — no long-lived secret in the workflow. NPM_TOKEN remains the
# fallback for the FIRST publish that creates each brand-new package (the
# `anodizer` metapackage and the `@tj-smith47/anodizer-*` platform packages —
# a Trusted Publisher cannot be attached to a package that does not yet
# exist); after a package exists and the Trusted Publisher is configured,
# drop the token.
# description/homepage/license/author are derived from Cargo.toml — never set
# here so they cannot drift from the crate metadata.
# auth: per-package credential selection (auto | token | oidc), default auto.
# In optional-deps mode the metapackage + each per-platform sub-package are
# decided independently: auto probes each package's existence and uses OIDC
# (Trusted Publishing) for existing packages where an OIDC context is present,
# the token for brand-new packages (TP cannot create them). On a failed OIDC
# publish, auto retries with the token and warns loudly that TP was not
# exercised. token = always token; oidc = strict TP, no token fallback.
npms:
  - scope: "@tj-smith47"
    metapackage: anodizer
    bin: anodizer
    mode: optional-deps
    access: public
    provenance: true
    auth: auto

# MCP (Model Context Protocol) server registry publisher.
#
# Publishes an apiv0.ServerJSON document to https://registry.modelcontextprotocol.io
# after a GitHub Actions OIDC token exchange. The `auth.type=github-oidc` path
# requires `id-token: write` on the publishing workflow — anodizer.yml's release
# job already grants this.
#
mcp:
  required: true
  retain_on_rollback: true  # external registry — retain even if a downstream publisher fails
  name: io.github.tj-smith47/anodizer
  title: anodizer
  description: "Rust release tooling — drop-in GoReleaser parity + Rust extras."
  repository:
    url: https://github.com/tj-smith47/anodizer
    source: github
  packages:
    - registry_type: oci
      identifier: ghcr.io/tj-smith47/anodizer
      transport:
        type: stdio
  auth:
    type: github-oidc

# AppImage — self-contained Linux binary bundle via linuxdeploy.
# Produces one .AppImage per Linux target architecture.
# linuxdeploy is auto-installed by anodizer-action when auto-install: true.
appimages:
  # Bind to the GNU build. AppImage groups binaries by Os/Arch, and the
  # filename renders only Arch (amd64) — gnu and musl x86_64 both produce
  # anodizer-<ver>-amd64.AppImage and clobber. linuxdeploy bundles glibc
  # libraries, so the AppImage must wrap the gnu binary.
  - ids: [anodizer]
    desktop: "assets/anodizer.desktop"
    icon: "assets/logo.png"
    filename: "{{ ProjectName }}-{{ Version }}-{{ Arch }}.AppImage"
    update_information: "gh-releases-zsync|tj-smith47|anodizer|latest|*.AppImage.zsync"

# SLSA build provenance — subjects mode writes dist/attestation-subjects.json;
# anodizer-action feeds it to actions/attest-build-provenance (OIDC).
# Requires attestations: write permission on the release job (see release.yml).
attestations:
  enabled: true
  mode: subjects

# Post-release verification gate — runs AFTER publish, reports defects.
# assert_assets: every produced artifact must appear as an uploaded release asset.
# install_smoke: installs each nfpm package in a container and runs anodizer --version.
# glibc_ceiling: fails if any glibc-linked .deb requires glibc > 2.36.
verify_release:
  enabled: true
  assert_assets: true
  install_smoke: {}
  glibc_ceiling: "2.36"

# Source RPM configuration
srpm:
  enabled: true
  package_name: anodizer
  spec_file: anodizer.spec
  file_name_template: "{{ ProjectName }}-{{ RawVersion }}-1.src.rpm"

# Makeself self-extracting archives
makeselfs:
  # Bind to the GNU build. makeself groups binaries by Os/Arch and the
  # filename renders Os-Arch (linux-amd64) — gnu and musl x86_64 both produce
  # anodizer-<ver>-linux-amd64-installer.run and clobber. The installer wraps
  # a glibc binary, so it must use the gnu build.
  - id: default
    ids: [anodizer]
    name: "anodizer Installer"
    script: scripts/makeself-install.sh
    filename: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-installer.run"

announce:
  # required_publishers (default): announce only when every required Assets/Manager/Submitter
  # publisher succeeded. all_publishers tightens to every configured publisher.
  # none disables the gate. Default is required_publishers.
  gate_on: required_publishers
  discord:
    enabled: false
    webhook_url: "{{ Env.DISCORD_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  discourse:
    enabled: false
    server: "{{ Env.DISCOURSE_URL }}"
    # auth uses the DISCOURSE_API_KEY env var; set category_id (the numeric
    # forum category id, required when enabled), e.g. category_id: 5
    title_template: "{{ ProjectName }} {{ Tag }} released"
  slack:
    enabled: false
    webhook_url: "{{ Env.SLACK_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  webhook:
    enabled: true
    endpoint_url: "https://tj.jarvispro.io/webhooks/anodizer"
    content_type: application/json
    message_template: '{"project":"{{ ProjectName }}","tag":"{{ Tag }}","url":"{{ ReleaseURL }}"}'
    headers:
      X-Anodizer-Source: "release"
    skip_tls_verify: false
    expected_status_codes:
      - 200
      - 202
  telegram:
    enabled: false
    bot_token: "{{ Env.TELEGRAM_BOT_TOKEN }}"
    chat_id: "{{ Env.TELEGRAM_CHAT_ID }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
    parse_mode: MarkdownV2
  teams:
    enabled: false
    webhook_url: "{{ Env.TEAMS_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  mattermost:
    enabled: false
    webhook_url: "{{ Env.MATTERMOST_WEBHOOK_URL }}"
    channel: releases
    username: release-bot
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  email:
    enabled: true
    host: smtp.gmail.com
    port: 587
    username: toss45@gmail.com
    from: toss45@gmail.com
    to:
      - "tj@jarvispro.io"
    subject_template: "{{ ProjectName }} {{ Tag }} released"
    message_template: "{{ ProjectName }} {{ Tag }} is now available at {{ ReleaseURL }}"
    encryption: starttls
    insecure_skip_verify: false
  reddit:
    enabled: false
    title_template: "{{ ProjectName }} {{ Tag }} released"
    url_template: "{{ ReleaseURL }}"
  twitter:
    enabled: false
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  mastodon:
    enabled: false
    server: "{{ Env.MASTODON_SERVER }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  bluesky:
    enabled: false
    username: "{{ Env.BLUESKY_USERNAME }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  linkedin:
    enabled: false
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  opencollective:
    enabled: false
    slug: "{{ Env.OPENCOLLECTIVE_SLUG }}"
    title_template: "{{ ProjectName }} {{ Tag }} released"
