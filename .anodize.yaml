# This config explicitly sets many fields to their default values for dogfooding
# purposes — to demonstrate and exercise as much of anodize as possible. In
# practice, you can omit any field that matches the default (e.g., dist, format,
# algorithm, draft, features, no_default_features, index_timeout, etc.).
#
# Templates use Tera syntax with Go-style compat. Tera features used below:
#   - Pipe filters: {{ Tag | trimprefix(prefix='v') }}
#   - New variables: {{ RawVersion }}, {{ Branch }}, {{ CommitDate }}, etc.
#
# Session 5 features exercised:
#   - version: 2 (schema version)
#   - source: archive generation
#   - sbom: software bill of materials
#   - upx: binary compression
#   - env_files: environment file loading

version: 2
project_name: anodize
dist: ./dist
env_files:
  - .env

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  flags: --release
  archives:
    format: tar.gz
    format_overrides:
      - os: windows
        format: zip
  checksum:
    algorithm: sha256

before:
  hooks:
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - cargo test

after:
  hooks:
    - echo "Release complete for {{ ProjectName }} {{ Tag }}"

crates:
  - name: anodize
    path: crates/cli
    tag_template: "v{{ Version }}"
    builds:
      - binary: anodize
        features: []
        no_default_features: false
    archives:
      - name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
        format: tar.gz
        format_overrides:
          - os: windows
            format: zip
        files:
          - LICENSE
          - README.md
          - docs/configuration.md
    checksum:
      name_template: "{{ ProjectName }}-{{ Version }}-checksums.txt"
      algorithm: sha256
    release:
      github:
        owner: tj-smith47
        name: anodize
      draft: false
      prerelease: auto
      make_latest: auto
      name_template: "{{ ProjectName }} {{ Tag }}"
    publish:
      crates:
        enabled: true
        index_timeout: 300
      homebrew:
        tap:
          owner: tj-smith47
          name: homebrew-tap
        folder: Formula
        description: "A Rust-native release automation tool"
        license: MIT
        install: |
          bin.install "anodize"
        test: |
          system "#{bin}/anodize", "--version"
      scoop:
        bucket:
          owner: tj-smith47
          name: scoop-bucket
        description: "A Rust-native release automation tool"
        license: MIT
    nfpm:
      - package_name: anodize
        formats:
          - deb
          - rpm
          - apk
        vendor: "TJ Smith"
        homepage: "https://github.com/tj-smith47/anodize"
        maintainer: "TJ Smith <tj@example.com>"
        description: "A Rust-native release automation tool"
        license: MIT
        bindir: /usr/bin
        file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
        contents:
          - src: LICENSE
            dst: /usr/share/doc/anodize/LICENSE
          - src: README.md
            dst: /usr/share/doc/anodize/README.md

changelog:
  header: "# Changelog for {{ ProjectName }}"
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Others
      order: 999

signs:
  - id: default
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"

source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  files:
    - "crates/**/*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
    - "LICENSE"
    - "README.md"

sbom:
  enabled: true
  format: cyclonedx

upx:
  - id: default
    enabled: false
    binary: upx
    args:
      - "--best"
      - "--lzma"

snapshot:
  name_template: "{{ Tag | trimprefix(prefix='v') }}-SNAPSHOT-{{ ShortCommit }}"

announce:
  discord:
    enabled: false
    webhook_url: "{{ Env.DISCORD_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  slack:
    enabled: false
    webhook_url: "{{ Env.SLACK_WEBHOOK_URL }}"
    message_template: "{{ ProjectName }} {{ Tag }} released! {{ ReleaseURL }}"
  webhook:
    enabled: false
    endpoint_url: "{{ Env.WEBHOOK_URL }}"
    headers:
      Authorization: "Bearer {{ Env.WEBHOOK_TOKEN }}"
    content_type: application/json
    message_template: '{"project":"{{ ProjectName }}","tag":"{{ Tag }}","url":"{{ ReleaseURL }}"}'
