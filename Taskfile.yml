version: '3'

# Plain anodizer output under CI (GHA forces ANSI, splitting asserted headers).
env:
  ANODIZER_COLOR: '{{if env "GITHUB_ACTIONS"}}never{{end}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  _check:tmp-headroom:
    internal: true
    desc: "Precondition: when /tmp is tmpfs, require it under 50% full — tmpfs pressure OOMs the cargo linker."
    preconditions:
      # The pressure scenario only applies when /tmp is backed by tmpfs
      # (Claude sandbox host). macOS, Windows, and GitHub Actions runners
      # all back /tmp with real disk; on those the linker can't OOM from
      # /tmp pressure, so skip the check entirely.
      - sh: '[ "$(uname)" != "Linux" ] || [ "$(stat -f -c %T /tmp 2>/dev/null)" != "tmpfs" ] || [ "$(df --output=pcent /tmp | tail -1 | tr -dc 0-9)" -lt 50 ]'
        msg: "/tmp is over 50% full — cargo will OOM under tmpfs RAM pressure. Run `du -sh /tmp/*/ | sort -hr | head` to find offenders and clean them. Write all scratch / debug / download files to `/opt/repos/.det-debug/` or `~/.cache/`, NEVER `/tmp`."

  build:
    desc: Build all default workspace members in release mode
    deps: [_check:tmp-headroom]
    sources:
      - "crates/**/src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
    generates:
      - "target/release/anodizer"
    cmds:
      - cargo build --release

  check:
    desc: Run cargo check on default workspace members
    deps: [_check:tmp-headroom]
    cmds:
      - cargo check --all-targets

  check:determinism:
    desc: "Byte-verify this host's OS-native release artifacts reproduce — CI-exact (--require-tools, host target matrix, preserve-dist)."
    deps: [_check:tmp-headroom]
    cmds:
      # Mirror anodizer-action's per-shard determinism command
      # (scripts/determinism/run-harness.sh): --require-tools so a missing
      # host-native producer HARD-FAILS instead of warn-skipping (the false
      # coverage that once hid installer formats), and the host's own target
      # subset (a Linux box cannot cross-build the darwin/windows partitions).
      # The CSV is derived from `anodize targets` — the same source
      # resolve-targets.sh filters — so it never drifts from the release matrix.
      - |
        set -eu
        case "{{OS}}" in
          linux)   runner=ubuntu-latest ;;
          darwin)  runner=macos-latest ;;
          windows) runner=windows-latest ;;
          *) echo "check:determinism: unsupported host OS '{{OS}}'" >&2; exit 1 ;;
        esac
        csv=$(cargo run -q -p anodizer --release -- targets --json \
          | jq -r --arg os "$runner" '(if type=="object" then .include else . end)|[.[]|select(.os==$os)|.target]|join(",")')
        [ -n "$csv" ] || { echo "check:determinism: no targets for runner $runner" >&2; exit 1; }
        echo "check:determinism (CI-exact): runner=$runner targets=$csv"
        cargo run -p anodizer --release -- check determinism \
          --require-tools --runs=2 --targets="$csv" --preserve-dist=./preserved-dist

  check:config:
    desc: "Validate this repo's anodize config (single-crate, post-restructure form)."
    deps: [_check:tmp-headroom]
    cmds:
      # No --workspace: this repo is single-crate (no `workspaces:` block), so
      # `--workspace=.` would error ("no workspaces defined") after validating.
      - cargo run -p anodizer --release -- check config

  release:snapshot:
    # FULL pre-push gate (canonical). Unlike `task snapshot` (slim, single
    # target, dry-run — the fast `task commit` gate), this runs a REAL build
    # of every host-buildable target plus the whole snapshot pipeline
    # (archive/sign/checksum/sbom) and the emission-validate stage — so a
    # broken binstall/nix/version-sync emission is caught locally before push.
    # `--host-targets` drops only the targets this host cannot cross-compile
    # (apple targets off a non-macOS host) so the real build never aborts;
    # the dropped triples are logged loudly. Snapshot mode auto-skips
    # publish/snapcraft-publish/blob/announce, so this is "everything this
    # host can build, minus publish/announce". `task prepush` aliases this so
    # there's one source of truth for the flag set.
    desc: "FULL pre-push: REAL build of all host-buildable targets + archive/sign/checksum + emission-validate (binstall/nix/version-sync). Slower than `task snapshot`."
    deps: [_check:tmp-headroom]
    cmds:
      - cargo run -p anodizer --release -- release --snapshot --clean --host-targets --summary-json=dist/snapshot-summary.json

  prepush:
    # Cross-platform evidence run — everything `task gate` cannot prove from this
    # box alone: a REAL build of every host-buildable target + emission-validate
    # (release:snapshot) and the workspace suite on every reachable OS (test:os).
    # Run it before a release push in addition to `task gate` (the CI-job mirror).
    desc: "Cross-platform evidence: FULL real build + emission-validate (release:snapshot) AND the workspace suite on every reachable OS (test:os). Complements task gate."
    cmds:
      - task: release:snapshot
      - task: test:os

  summary:show:
    desc: "Pretty-print the most recent run summary."
    cmds:
      - jq . dist/run-*/summary.json | less

  fmt:
    desc: Format all code
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - cargo fmt -- --check

  clippy:
    desc: Run clippy with warnings as errors (default members)
    deps: [_check:tmp-headroom]
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:
    desc: Run all tests (default members, incl. doctests)
    # The go-task-less fallback in .claude/scripts/test-os-suite.sh hand-mirrors
    # these cargo passes for validation hosts that lack go-task; a pass added
    # here must be added there too. audit-workflow-lockstep fails CI on drift.
    deps: [_check:tmp-headroom]
    cmds:
      - cargo nextest run --workspace --no-fail-fast
      # nextest never runs doctests; without this second pass a broken rustdoc
      # example would ship through every gate that runs the workspace suite.
      - cargo test --workspace --doc

  test:lib:
    desc: Run unit tests only (no integration/doc tests)
    deps: [_check:tmp-headroom]
    cmds:
      - cargo nextest run --workspace --no-fail-fast --lib

  test:os:
    desc: "Run the workspace suite on every REACHABLE OS host (this box + winserver + mbp); offline hosts SKIP loudly; fail if any reachable host fails. Ships HEAD via git bundle (proves the un-pushed commit)."
    # The local leg runs the workspace suite via test-os-suite.sh (nextest where
    # present, else cargo test); guard tmpfs headroom like every other cargo
    # task so a standalone `task test:os` can't OOM the linker.
    deps: [_check:tmp-headroom]
    cmds:
      - bash .claude/scripts/test-os.sh

  docs:
    desc: Generate reference docs (CLI + configuration)
    deps: [build]
    cmds:
      - cargo xtask gen-docs

  docs:check:
    desc: Verify generated docs are up-to-date
    deps: [build]
    cmds:
      - cargo xtask gen-docs --check

  docs:validate-readme:
    desc: Validate anodizer YAML config blocks in README.md against the current schema
    cmds:
      - cargo xtask validate-readme

  package:
    desc: Dry-run package all publishable crates
    deps: [_check:tmp-headroom]
    cmds:
      - cargo package --workspace --no-verify --allow-dirty --exclude xtask

  snapshot:
    # SLIM, fast gate wired into `task commit` (via `task lint`). Single target,
    # dry-run (compiles nothing) — kept fast on purpose. For the thorough
    # pre-push check (a REAL build of every host-buildable target +
    # emission-validate), use `task prepush` / `task release:snapshot`.
    desc: "SLIM commit gate: dry-run pipeline, single target, no publish (fast). For the full pre-push real build use `task prepush`."
    deps: [build]
    cmds:
      - ./target/release/anodizer release --snapshot --single-target --clean --dry-run

  clean:
    desc: Remove build artifacts and dist directory
    cmds:
      - cargo clean
      - rm -rf dist/

  coverage:check:
    desc: Run workspace test coverage and write cobertura.xml. No branch switching, no push.
    cmds:
      - cargo llvm-cov nextest --cobertura --output-path cobertura.xml
      - 'echo "Coverage (line, cobertura): $(bash .claude/scripts/coverage-percent.sh cobertura.xml)"'

  coverage:publish:
    desc: Run workspace test coverage, enforce the coverage floor, and publish the badge update to origin/badges. Switches branches via the badge script; CI only.
    cmds:
      - cargo llvm-cov nextest --cobertura --output-path cobertura.xml
      - bash .claude/scripts/coverage-percent.sh cobertura.xml
      # Gate before publishing so CI fails loudly instead of quietly
      # shipping a lower badge. Floor lives in coverage-gate.sh only.
      - bash .claude/scripts/coverage-gate.sh cobertura.xml
      - bash .claude/scripts/publish-coverage.sh cobertura.xml

  coverage:gate:
    desc: "Coverage floor gate: run the instrumented suite quietly (full output in target/coverage-gate.log), then fail below the floor (default in coverage-gate.sh; override via COVERAGE_FLOOR)."
    deps: [_check:tmp-headroom]
    cmds:
      # The instrumented run spews thousands of compile/test lines; keep the
      # terminal to percent + verdict and park the rest in a logfile.
      - mkdir -p target
      - |
        if ! cargo llvm-cov nextest --cobertura --output-path cobertura.xml > target/coverage-gate.log 2>&1; then
          echo "instrumented test run failed — tail of target/coverage-gate.log:" >&2
          tail -n 40 target/coverage-gate.log >&2
          exit 1
        fi
      - bash .claude/scripts/coverage-gate.sh cobertura.xml

  tidy:
    desc: Format code and regenerate docs
    cmds:
      - task: fmt
      - task: docs

  audit:deps:
    desc: "Guard: dependency tree carries no unaddressed RUSTSEC advisory (mirrors the CI cargo-audit job; honors .cargo/audit.toml ignores)."
    cmds:
      - cargo audit

  audit:workflows:
    desc: "Guard: GitHub workflow files pass actionlint + the job-timeout, gate-mirror, and cross-file lockstep audits (mirrors the CI actionlint job)."
    cmds:
      - actionlint -color
      - task: audit:job-timeouts
      - task: audit:gate-mirror
      - task: audit:workflow-lockstep

  audit:workflow-lockstep:
    desc: "Guard: hand-synced workflow copies (shard roster, publish secret env, trigger gate, release/nightly mutex, bootstrap artifact, post-release gate) stay in lockstep."
    cmds:
      - .claude/scripts/audit-workflow-lockstep.sh

  audit:log:
    desc: "Guard: no subprocess command-echo at default log verbosity (status vs verbose)."
    cmds:
      - .claude/scripts/audit-log-status.sh

  audit:test-isolation:
    desc: "Guard: no unjustified process-global env mutation in tests (serial/seam/env-ok)."
    cmds:
      - .claude/scripts/audit-test-isolation.sh

  audit:log-labels:
    desc: "Guard: Warning/Error/Note status labels come only from log.rs (no open-coding)."
    cmds:
      - .claude/scripts/audit-log-labels.sh

  audit:test-spawn:
    desc: "Guard: TEST-context git/node spawns route through output_with_spawn_retry (Windows nextest flake)."
    cmds:
      - .claude/scripts/audit-test-spawn-retry.sh

  audit:job-timeouts:
    desc: "Guard: every .github/workflows job declares a positive-integer timeout-minutes (reusable-workflow callers exempt)."
    cmds:
      - .claude/scripts/audit-job-timeouts.sh

  audit:repo-identity:
    desc: "Guard: owner/repo slug + GitHub token resolve through their one canonical path (no ad-hoc remote re-parse / unfiltered token read)."
    cmds:
      - .claude/scripts/audit-repo-identity.sh

  audit:gate-mirror:
    desc: "Guard: task gate mirrors every blocking ci.yml job (fails when a CI job has no registered local equivalent)."
    cmds:
      - .claude/scripts/audit-gate-mirror.sh

  lint:
    desc: Local pre-commit check (tidy, clippy, build, snapshot dry-run)
    cmds:
      - task: tidy
      - task: clippy
      - task: build
      - task: snapshot
      - task: audit:log
      - task: audit:log-labels
      - task: audit:test-isolation
      - task: audit:test-spawn
      - task: audit:job-timeouts
      - task: audit:repo-identity
      - task: audit:gate-mirror
      - task: audit:workflow-lockstep

  ci:
    desc: Run all CI checks (everything except cross-platform builds)
    cmds:
      - task: fmt:check
      - task: clippy
      - task: test
      - task: docs:check
      - task: package

  gate:
    # Canonical pre-push / pre-release gate: this MUST run every job that blocks
    # release.yml (i.e. every ci.yml job). release.yml triggers on the whole CI
    # workflow succeeding, so any ci.yml job that is not mirrored here is a hole
    # through which a red CI slips to a push. When a ci.yml job is added, add its
    # local equivalent here (enforced by audit:gate-mirror). Slow by design
    # (the instrumented coverage run dominates); the snapshot step is the same
    # dry-run CI runs. `task ci` remains the fast inner-loop subset.
    desc: "FULL local gate — mirrors EVERY blocking CI job (fmt, clippy, cargo-audit, test, package, docs-check, validate-readme, check-config, snapshot, coverage, actionlint). Slow; the pre-push floor."
    cmds:
      - task: ci                     # fmt:check, clippy, test, docs:check, package
      - task: audit:deps             # cargo-audit
      - task: docs:validate-readme   # validate-readme
      - task: check:config           # check-config
      - task: snapshot               # snapshot (dry-run)
      - task: audit:workflows        # actionlint
      - task: coverage:gate          # coverage floor

  commit:
    desc: "Lint (regenerates docs), restage only the user's intended files, then commit. Usage: task commit -- -m 'my message'"
    preconditions:
      - sh: git diff --cached --quiet || test -n "$(git diff --cached --name-only)"
        msg: "Nothing staged. Stage files with git add before running task commit."
    vars:
      STAGED_PRE:
        sh: git diff --cached --name-only
      MODIFIED_PRE:
        sh: git diff --name-only
    cmds:
      - task: lint
      - task: _commit:restage
        vars:
          STAGED_LIST: "{{.STAGED_PRE}}"
          MODIFIED_LIST: "{{.MODIFIED_PRE}}"
      - git commit {{.CLI_ARGS}}

  push:
    desc: "Full-gate push: runs task gate (every blocking CI job mirrored locally), then pushes. Usage: task push [-- <git push args>] (defaults to origin master)."
    preconditions:
      # Uncommitted changes must not ride along on a push decision — gate the
      # coverage run and the push on a clean tree.
      - sh: git diff --quiet && git diff --cached --quiet
        msg: "Working tree is dirty — commit or stash before task push."
    cmds:
      - task: gate
      - git push {{.CLI_ARGS | default "origin master"}}

  _commit:restage:
    internal: true
    desc: "Internal: re-stage files that were staged at task start (capture lint touchups) plus any files lint NEWLY modified (auto-generated content). Files modified-but-unstaged at task start are left untouched so they don't contaminate the commit."
    cmds:
      - |
        # (a) Re-add files that were staged pre-task. Use -A so deletes and
        # renames staged with `git mv` aren't lost when lint touches them.
        # Tolerate already-staged deletions: in git 2.53+, `git add -A` on a
        # path that is only present as a staged deletion (no working-tree
        # entry, no untracked entry, only an index removal) errors with
        # "pathspec did not match any files". The deletion is already in
        # the index from the user's pre-stage, so skipping it is harmless.
        while IFS= read -r f; do
          [ -z "$f" ] && continue
          if [ -e "$f" ] || git ls-files --error-unmatch -- "$f" >/dev/null 2>&1; then
            git add -A -- "$f"
          fi
        done <<'STAGED_EOF'
        {{.STAGED_LIST}}
        STAGED_EOF
        # (b) Add files that lint NEWLY modified — i.e., not in pre-task
        # staged OR modified lists. These are typically docs/snapshots
        # regenerated by the lint step and belong with the commit.
        git diff --name-only | while IFS= read -r f; do
          [ -z "$f" ] && continue
          printf '%s\n' '{{.STAGED_LIST}}' | grep -qxF -- "$f" && continue
          printf '%s\n' '{{.MODIFIED_LIST}}' | grep -qxF -- "$f" && continue
          git add -- "$f"
        done
