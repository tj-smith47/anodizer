version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build all default workspace members in release mode
    sources:
      - "crates/**/src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
    generates:
      - "target/release/anodize"
    cmds:
      - cargo build --release

  check:
    desc: Run cargo check on default workspace members
    cmds:
      - cargo check --all-targets

  fmt:
    desc: Format all code
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - cargo fmt -- --check

  clippy:
    desc: Run clippy with warnings as errors (default members)
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:
    desc: Run all tests (default members)
    cmds:
      - cargo test

  test:lib:
    desc: Run unit tests only (no integration/doc tests)
    cmds:
      - cargo test --lib

  docs:
    desc: Generate reference docs (CLI + configuration)
    deps: [build]
    cmds:
      - cargo xtask gen-docs

  docs:check:
    desc: Verify generated docs are up-to-date
    deps: [build]
    cmds:
      - cargo xtask gen-docs --check

  package:
    desc: Dry-run package all publishable crates
    cmds:
      - cargo package --workspace --no-verify --allow-dirty --exclude xtask

  snapshot:
    desc: Dry-run release pipeline (single target, no publish)
    deps: [build]
    cmds:
      - ./target/release/anodize release --snapshot --single-target --clean --dry-run

  clean:
    desc: Remove build artifacts and dist directory
    cmds:
      - cargo clean
      - rm -rf dist/

  tidy:
    desc: Format code and regenerate docs
    cmds:
      - task: fmt
      - task: docs

  lint:
    desc: Local pre-commit check (tidy, clippy, build, snapshot dry-run)
    cmds:
      - task: tidy
      - task: clippy
      - task: build
      - task: snapshot

  ci:
    desc: Run all CI checks (everything except cross-platform builds)
    cmds:
      - task: fmt:check
      - task: clippy
      - task: test
      - task: docs:check
      - task: package

  commit:
    desc: "Lint (regenerates docs), restage tracked changes, then commit. Usage: task commit -- -m 'my message'"
    preconditions:
      - sh: git diff --cached --quiet || test -n "$(git diff --cached --name-only)"
        msg: "Nothing staged. Stage files with git add before running task commit."
    cmds:
      - task: lint
      # Lint can regenerate tracked files (docs, fmt). Re-stage them so the
      # commit snapshot includes the fresh content; otherwise the working
      # tree ends dirty after `task commit` and the user has to commit a
      # follow-up. Mirrors cfgd's Taskfile.yml::commit.
      - git add -u
      - git commit {{.CLI_ARGS}}
