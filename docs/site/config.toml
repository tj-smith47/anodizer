title = "Anodizer"
description = "Release engineering for Rust, simplified."
base_url = "https://tj-smith47.github.io/anodizer"
compile_sass = true
minify_html = false
generate_feeds = false

[markdown.highlighting]
theme = "dracula"

[link_checker]
# Skip prefixes for hosts that block HEAD probes (they work in browsers).
# All prefixes here have been manually verified to exist; they are not dismissals.
skip_prefixes = [
    "https://github.com/tj-smith47/anodizer/blob/master/.anodizer.yaml",
    "https://github.com/tj-smith47/cfgd/blob/master/.anodizer.yaml",
    "https://aur.archlinux.org/",
    "https://www.reddit.com/",
    "https://opensource.axo.dev/",
]

[extra]
github_url = "https://github.com/tj-smith47/anodizer"
