name: "Anodize"
description: "Release Rust projects with Anodize"
branding:
  icon: "package"
  color: "orange"

inputs:
  version:
    description: "Anodize version to install (e.g., v0.1.0). Defaults to latest."
    required: false
    default: "latest"
  args:
    description: "Arguments to pass to anodize (e.g., 'release --snapshot')"
    required: false
    default: "release"
  install-only:
    description: "Only install anodize, don't run it"
    required: false
    default: "false"
  workdir:
    description: "Working directory for anodize"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install Anodize
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          cargo install anodize --locked
        else
          cargo install anodize --version "${VERSION#v}" --locked
        fi

        echo "Anodize installed: $(anodize --version)"

    - name: Run Anodize
      if: inputs.install-only != 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        ANODIZE_ARGS: ${{ inputs.args }}
      run: anodize $ANODIZE_ARGS
