name: Download preserved dist
description: >-
  Pull the byte-proven dist-* shard artifacts a Release run produced (or that a
  prior run preserved) and merge them into one directory. Shared by the publish
  and publish-oidc jobs, which both consume the identical preserved dist.

inputs:
  run-id:
    description: >-
      Release run id whose dist-* artifacts to download. Pass the resolved
      reuse-id when re-publishing a preserved dist; empty falls back to the
      current run.
    default: ""
  path:
    description: Directory the merged dist-* artifacts are written to.
    default: dist/
  github-token:
    description: Token used to download artifacts from another run.
    default: ""

runs:
  using: composite
  steps:
    - name: Download and merge preserved dist-* shards
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: ${{ inputs.path }}
        pattern: dist-*
        merge-multiple: true
        run-id: ${{ inputs.run-id != '' && inputs.run-id || github.run_id }}
        github-token: ${{ inputs.github-token }}
