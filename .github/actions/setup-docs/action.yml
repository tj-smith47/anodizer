name: Setup Docs
description: >-
  Provision the docs jobs' shared toolchain: stable Rust, the Swatinem build
  cache, and go-task. Collapses the toolchain/cache/task steps the docs.yml
  freshness-check and site-build jobs otherwise repeat. Checkout is NOT included
  — a local composite requires the repo already checked out, so each job keeps
  its own checkout step (matching the setup-rust composite's contract).

inputs:
  cache-targets:
    description: >-
      Forwarded to Swatinem/rust-cache. Set "false" on the site-build job, which
      only runs codegen tasks and never reuses the target/ build outputs.
    default: "true"
  github-token:
    description: Token forwarded to go-task/setup-task as repo-token to avoid API rate limits.
    default: ""

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable branch
      with:
        toolchain: stable

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        cache-targets: ${{ inputs.cache-targets }}

    - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        repo-token: ${{ inputs.github-token }}
