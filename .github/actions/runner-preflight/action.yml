name: Runner preflight
description: >-
  Fail-fast environment check for the arc-anodizer self-hosted runner: dind
  socket, pod-injected MinIO credentials, MinIO health endpoint, passwordless
  sudo, and baseline CLI tools. Collects every failure before exiting so one
  run reports the full environment state.

runs:
  using: composite
  steps:
    - name: Preflight runner environment
      shell: bash
      run: |
        set -euo pipefail
        fail=0
        if docker info >/dev/null 2>&1; then
          echo "ok: docker"
        else
          echo "::error::docker info failed (dind socket unreachable)"
          fail=1
        fi
        if test -n "${AWS_ACCESS_KEY_ID:-}"; then
          echo "ok: AWS_ACCESS_KEY_ID"
        else
          echo "::error::AWS_ACCESS_KEY_ID empty — injected via envFrom secret minio-ci-creds on the arc-anodizer runner pod; check secret + pod spec"
          fail=1
        fi
        if test -n "${AWS_SECRET_ACCESS_KEY:-}"; then
          echo "ok: AWS_SECRET_ACCESS_KEY"
        else
          echo "::error::AWS_SECRET_ACCESS_KEY empty — injected via envFrom secret minio-ci-creds on the arc-anodizer runner pod; check secret + pod spec"
          fail=1
        fi
        endpoint="$(grep '^MINIO_ENDPOINT=' .env.release | cut -d= -f2-)" || endpoint=""
        if test -z "$endpoint"; then
          echo "::error::MINIO_ENDPOINT not found in .env.release"
          fail=1
        elif curl -fsS -o /dev/null --max-time 10 "$endpoint/minio/health/ready"; then
          echo "ok: minio ($endpoint)"
        else
          echo "::error::MinIO not ready at $endpoint/minio/health/ready"
          fail=1
        fi
        if sudo -n true 2>/dev/null; then
          echo "ok: sudo"
        else
          echo "::error::passwordless sudo unavailable (rebuild registry.jarvispro.io/arc-runner image with NOPASSWD sudoers entry)"
          fail=1
        fi
        for tool in git gh curl python3; do
          if command -v "$tool" >/dev/null 2>&1; then
            echo "ok: $tool"
          else
            echo "::error::$tool not on PATH ($tool missing from arc-runner image)"
            fail=1
          fi
        done
        exit "$fail"
