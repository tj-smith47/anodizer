name: Setup Rust
description: >-
  Provision a Rust CI job: toolchain (+ components/targets), optional sccache,
  Swatinem build cache, go-task, taiki-e cargo tools, and the Linux flat-installer
  packaging toolchain. Collapses the toolchain/cache/task/tool steps every ci.yml
  Rust job otherwise repeats. Checkout is NOT included — a local composite requires
  the repo already checked out, so each job keeps its own checkout step.

inputs:
  toolchain:
    description: Rust toolchain channel passed to dtolnay/rust-toolchain.
    default: stable
  components:
    description: Space/comma-separated rustup components (e.g. "clippy", "llvm-tools-preview").
    default: ""
  targets:
    description: Space/comma-separated rustup targets to add.
    default: ""
  cache:
    description: "true to enable the Swatinem/rust-cache build cache."
    default: "true"
  cache-key:
    description: Extra key segment for rust-cache so distinct jobs don't share a cache slot.
    default: ""
  sccache:
    description: >-
      "true to start mozilla-actions/sccache-action. Leave false for coverage:
      sccache's compile cache masks the source llvm-cov must instrument. Callers
      enabling this must also set the job-level RUSTC_WRAPPER=sccache env."
    default: "false"
  task:
    description: "true to install go-task (for jobs that run `task` targets)."
    default: "false"
  github-token:
    description: Token forwarded to go-task/setup-task as repo-token to avoid API rate limits.
    default: ""
  tools:
    description: Comma-separated cargo tools for taiki-e/install-action (e.g. "cargo-nextest,cargo-llvm-cov").
    default: ""
  linux-packaging-tools:
    description: >-
      "true to install the Linux installer-assembly toolchain available on
      the GitHub-hosted runner: cpio/genisoimage/nsis/msitools/makeself via apt.
      These cover the dmg/nsis/msi/makeself assembly stages, which runtime-probe
      their tool and skip-with-pass when absent. The flat-pkg (.pkg) stage additionally
      needs bomutils(mkbom)+xar, neither of which is packaged for Ubuntu 24.04;
      its 2 end-to-end tests stay hermetic skip-with-pass here and are exercised
      locally / on the self-hosted release runner (whose base image carries them).
      The pre-spawn .pkg logic is covered by injected-probe unit tests regardless.
      nfpm is provisioned separately via the `nfpm` input, not here."
    default: "false"
  nfpm:
    description: >-
      "true to install nfpm (deb/rpm/apk) from its release tarball. Set on any
      job whose tests drive the nfpm determinism stage: the gate hard-fails
      rather than skipping when the tool is absent, so it must be present.
      Linux-only."
    default: "false"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable branch
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - if: ${{ inputs.sccache == 'true' }}
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

    - if: ${{ inputs.cache == 'true' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: ${{ inputs.cache-key }}

    - if: ${{ inputs.task == 'true' }}
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        repo-token: ${{ inputs.github-token }}

    - if: ${{ inputs.tools != '' }}
      uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
      with:
        tool: ${{ inputs.tools }}

    - if: ${{ inputs.linux-packaging-tools == 'true' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cpio genisoimage nsis msitools makeself

    # nfpm has no apt package, so it installs from its release tarball, verified
    # against the release's checksums.txt (immutable tag → no hardcoded sha to
    # drift). Linux-only: the tarball is a Linux build and the test that needs it
    # is cfg(target_os = "linux").
    - if: ${{ inputs.nfpm == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        set -euo pipefail
        version=2.46.3
        case "$RUNNER_ARCH" in
          X64)   arch=x86_64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::unsupported arch for nfpm: $RUNNER_ARCH"; exit 1 ;;
        esac
        base="https://github.com/goreleaser/nfpm/releases/download/v${version}"
        tarball="nfpm_${version}_Linux_${arch}.tar.gz"
        dir="${RUNNER_TEMP:-/tmp}/nfpm"
        mkdir -p "$dir"
        curl -sSfL "${base}/${tarball}" -o "${dir}/${tarball}"
        curl -sSfL "${base}/checksums.txt" -o "${dir}/checksums.txt"
        expected=$(grep " ${tarball}\$" "${dir}/checksums.txt" | awk '{print $1}')
        echo "${expected}  ${dir}/${tarball}" | sha256sum -c -
        tar -xzf "${dir}/${tarball}" -C "$dir" nfpm
        chmod +x "${dir}/nfpm"
        printf '%s\n' "$dir" >> "$GITHUB_PATH"
        "${dir}/nfpm" --version
