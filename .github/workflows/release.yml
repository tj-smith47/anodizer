name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read  # needed for cross-workflow artifact download

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  determinism-check:
    name: Determinism Harness (${{ matrix.shard }})
    # The harness is also the build step on a tag-push run. With
    # `preserve-dist: true` and the action's `--no-snapshot` shim on
    # tag refs, run-0 of each shard's worktree produces byte-stable
    # artifacts named with the actual release version. Those bytes are
    # uploaded under `dist-<shard>` and consumed downstream by the
    # `release:` job's `--publish-only` step — eliminating a separate
    # recompile job. Shard the matrix per-target when a runner's
    # cross-compile combo is the critical path; otherwise group the
    # targets that a runner can natively build into one shard.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shard: ubuntu-latest
            targets: ''
          - os: macos-latest
            shard: macos-latest
            targets: ''
          - os: windows-latest
            shard: windows-x86_64
            targets: 'x86_64-pc-windows-msvc'
          - os: windows-latest
            shard: windows-aarch64
            targets: 'aarch64-pc-windows-msvc'
    runs-on: ${{ matrix.os }}
    steps:
      # Shallow clone is sufficient: the harness only reads HEAD's
      # commit hash + timestamp.
      - uses: actions/checkout@v4
      - uses: tj-smith47/anodizer-action@v1
        with:
          determinism: true
          determinism-targets: ${{ matrix.targets }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # Upload the byte-stable dist tree on green so the `release:`
      # job can ship it via `--publish-only`. `if: success()` is the
      # load-bearing invariant: a drift-failed shard MUST NOT upload
      # preserved bytes — shippable artifacts may only ever originate
      # from a green determinism run.
      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.shard }}
          path: preserved-dist/
          if-no-files-found: error

      # Preserve the harness report even when this job fails. Without
      # this, a drift failure loses the `differing_bytes_summary` and
      # `drift-bins` diagnostic the moment the run's artifacts expire.
      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-${{ matrix.shard }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**
          if-no-files-found: warn

  release:
    name: Publish Release
    needs: determinism-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      # Download every shard's preserved dist into dist/. `merge-multiple:
      # true` flattens them on top of each other; the action renames each
      # shard's `context.json` / `artifacts.json` with a `-<shard>` suffix
      # at upload time so no two files collide.
      - name: Download preserved dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Verify preserved dist
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -maxdepth 1 \( -name 'context.json' -o -name 'context-*.json' \) -type f)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No preserved-dist context manifests found in dist/"
            exit 1
          fi
          printf 'Found %d preserved-dist context manifest(s):\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"

      # `fail-fast: false` above allows one drift failure to leave the
      # other shards green. Reject a partial dist tree before signing.
      - name: Assert all shards present
        run: |
          set -euo pipefail
          expected=(ubuntu-latest macos-latest windows-x86_64 windows-aarch64)
          missing=()
          for shard in "${expected[@]}"; do
            [ -f "dist/context-${shard}.json" ] || missing+=("$shard")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing context-<shard>.json for: %s\n' "${missing[*]}"
            exit 1
          fi
          echo "All ${#expected[@]} shards uploaded preserved dist."

      - name: Run anodizer release --publish-only
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          install: nfpm,makeself,snapcraft,rpmbuild,cosign,syft
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: release --publish-only
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-summary-${{ github.sha }}
          path: |
            dist/run-*/summary.json
            dist/run-*/determinism.json
          if-no-files-found: warn
