name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)publish against, e.g. v0.7.0. Empty runs the normal auto-tag flow on the latest master CI."
        required: false
        default: ""
      skip_determinism:
        description: "Reuse a prior run's byte-proven dist instead of rebuilding it. Re-publishes the identical artifacts, so winget/homebrew hashes stay valid."
        type: boolean
        required: false
        default: false
      dist_run_id:
        description: "Release run id whose preserved dist-* artifacts to reuse when skip_determinism is set. Empty auto-resolves to the latest Release run for the target commit."
        required: false
        default: ""
      anodizer_version:
        description: "anodizer build that runs the publish, e.g. 0.8.0 to re-publish an older tag with a newer anodizer. Empty uses the binary built for the target commit."
        required: false
        default: ""

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: Auto-tag
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      tagged: ${{ steps.resolve.outputs.tagged }}
      dist_run_id: ${{ steps.resolve.outputs.dist_run_id }}
      run_determinism: ${{ steps.resolve.outputs.run_determinism }}
      is_republish: ${{ steps.resolve.outputs.is_republish }}
      publish_from_artifact: ${{ steps.resolve.outputs.publish_from_artifact }}
      publish_version: ${{ steps.resolve.outputs.publish_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.tag || github.event.workflow_run.head_sha || github.sha }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Auto-tag release
        id: autotag
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.tag == '' }}
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          artifact-workflow: ci.yml
          artifact-run-id: auto
          args: tag --push --changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve release target
        id: resolve
        uses: ./.github/actions/resolve-release-target
        with:
          tag: ${{ inputs.tag }}
          skip-determinism: ${{ inputs.skip_determinism }}
          dist-run-id: ${{ inputs.dist_run_id }}
          anodizer-version: ${{ inputs.anodizer_version }}
          autotag-sha: ${{ steps.autotag.outputs.head-sha }}
          autotag-tagged: ${{ steps.autotag.outputs.tagged }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Sharded byte-for-byte reproducibility gate, one shard per host/target.
  # The shard matrix lives in the reusable determinism.yml so it is defined
  # once; each shard uploads its preserved dist for the release job to consume.
  determinism-check:
    name: Determinism
    needs: tag
    if: needs.tag.result == 'success' && needs.tag.outputs.tagged == 'true' && needs.tag.outputs.run_determinism == 'true'
    uses: ./.github/workflows/determinism.yml
    with:
      head_sha: ${{ needs.tag.outputs.sha }}
    secrets: inherit

  release:
    name: Publish Release
    needs: [tag, determinism-check]
    if: needs.tag.result == 'success' && needs.tag.outputs.tagged == 'true' && (needs.determinism-check.result == 'success' || needs.determinism-check.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download preserved dist artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true
          run-id: ${{ needs.tag.outputs.dist_run_id != '' && needs.tag.outputs.dist_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify preserved dist
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -maxdepth 1 \( -name 'context.json' -o -name 'context-*.json' \) -type f)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No preserved-dist context manifests found in dist/"
            exit 1
          fi
          printf 'Found %d preserved-dist context manifest(s):\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"

      - name: Assert all shards present
        run: |
          set -euo pipefail
          expected=(ubuntu-latest macos-latest windows-x86_64 windows-aarch64)
          missing=()
          for shard in "${expected[@]}"; do
            [ -f "dist/context-${shard}.json" ] || missing+=("$shard")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing context-<shard>.json for: %s\n' "${missing[*]}"
            exit 1
          fi
          echo "All ${#expected[@]} shards uploaded preserved dist."

      - name: Run anodizer release --publish-only
        id: release
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: ${{ needs.tag.outputs.publish_from_artifact }}
          version: ${{ needs.tag.outputs.publish_version }}
          artifact-run-id: auto
          artifact-workflow: ci.yml
          install: nfpm,makeself,snapcraft,rpmbuild,cosign,syft
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: release --publish-only
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Rollback on release failure
        if: ${{ always() && needs.tag.outputs.is_republish != 'true' && (steps.release.outcome == 'failure' || steps.release.outcome == 'cancelled') }}
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          args: tag rollback ${{ needs.tag.outputs.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: run-summary-${{ needs.tag.outputs.sha }}
          path: |
            dist/run-*/summary.json
            dist/run-*/determinism.json
          if-no-files-found: warn
