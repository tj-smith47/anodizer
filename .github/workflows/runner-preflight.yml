name: Runner canary (arc-anodizer)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  canary:
    name: arc-anodizer canary
    runs-on: arc-anodizer
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Docker pull and run
        run: docker run --rm alpine:3 true

      # Config-derived environment preflight: the same `anodizer preflight`
      # engine the release pipeline runs before any stage. Mirrors the
      # release job's tool install + secret env block so a green canary
      # means the publish job's environment is actually runnable —
      # missing tools, empty secrets, unreachable MinIO, and unloadable
      # key material are all collected in one pass.
      - name: Install release tooling and run anodizer preflight
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          artifact-workflow: ci.yml
          artifact-run-id: auto
          install: nfpm,makeself,snapcraft,rpmbuild,cosign,syft,alejandra
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: preflight --publish-only
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Assert installed tool versions
        run: |
          set -euo pipefail
          fail=0
          for check in "nfpm --version" "makeself --version" "snapcraft version" "rpmbuild --version" "cosign version" "syft version" "alejandra --version"; do
            tool="${check%% *}"
            arg="${check#* }"
            if "$tool" "$arg" >/dev/null 2>&1; then
              echo "ok: $tool"
            else
              echo "::error::$tool version check failed ($check) — anodizer-action install did not provide it"
              fail=1
            fi
          done
          exit "$fail"

      # The flatpaks publisher shells out to flatpak-builder, which drives
      # bwrap (bubblewrap). bwrap needs working unprivileged user namespaces
      # (CLONE_NEWUSER). The arc-anodizer runner container is unprivileged
      # (only its dind sidecar is privileged), so userns support depends on
      # the node's kernel config and the RuntimeDefault seccomp profile —
      # it must be proven on the real runner, never assumed.
      - name: Probe bwrap unprivileged user namespace (flatpak prerequisite)
        run: |
          set -euo pipefail
          if ! command -v bwrap >/dev/null 2>&1; then
            # bubblewrap ships with flatpak-builder; install it standalone so
            # the userns probe can run even before the publisher's toolchain.
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends bubblewrap
          fi
          echo "bwrap: $(bwrap --version)"
          if bwrap --unshare-user --unshare-ipc --unshare-pid --unshare-net --unshare-uts --unshare-cgroup --uid 0 --gid 0 --ro-bind / / -- /bin/true; then
            echo "ok: bwrap unprivileged userns works — flatpaks publisher prerequisite satisfied"
          else
            echo "::error::bwrap unprivileged userns failed on arc-anodizer — flatpaks publisher will not work; enable unprivileged_userns_clone on the node or relax the runner seccomp profile (do NOT make the runner privileged)"
            exit 1
          fi
          if command -v flatpak-builder >/dev/null 2>&1; then
            echo "flatpak-builder: $(flatpak-builder --version)"
          else
            echo "note: flatpak-builder not installed on this image — anodizer installs it at publish time"
          fi
