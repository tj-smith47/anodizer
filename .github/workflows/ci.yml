name: CI

on:
  push:
    branches: [master, 'session-*/**']
  pull_request:
  # recovery trigger: lets CI run on a head whose push was suppressed
  # (e.g. a skip marker inherited into a revert subject)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install actionlint
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          version=1.7.12
          base="https://github.com/rhysd/actionlint/releases/download/v${version}"
          curl -fsSL --retry 5 -O "${base}/actionlint_${version}_linux_amd64.tar.gz"
          curl -fsSL --retry 5 -O "${base}/actionlint_${version}_checksums.txt"
          grep " actionlint_${version}_linux_amd64.tar.gz\$" "actionlint_${version}_checksums.txt" | sha256sum -c -
          tar -xzf "actionlint_${version}_linux_amd64.tar.gz" actionlint
      - name: Lint workflows
        run: |
          "${RUNNER_TEMP}/actionlint" -color

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache: "false"
          task: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          sccache: "true"
          task: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      # The release-binary bootstrap runs on master, Linux only — used by the
      # `release` job's `--publish-only` step (consumed via
      # `from-artifact: anodizer-linux`) and the snapshot dry-run. Stated once
      # here so both the build and upload steps gate on the same condition.
      RELEASE_BOOTSTRAP: ${{ github.ref == 'refs/heads/master' && matrix.os == 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
          task: "true"
          tools: cargo-nextest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tests
        run: task test
      - name: Build release binary
        if: env.RELEASE_BOOTSTRAP == 'true'
        run: task build
      - name: Upload release binary
        if: env.RELEASE_BOOTSTRAP == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: anodizer-linux
          path: target/release/anodizer

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
          task: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Validate release pipeline
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          args: release --snapshot --single-target --clean --dry-run

  validate-readme:
    name: Validate README YAML
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
      - name: Validate README config blocks
        run: cargo xtask validate-readme

  check-config:
    name: Check Config
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
      - name: Build anodize CLI
        run: cargo build --release -p anodizer
      - name: Validate .anodizer.yaml
        run: ./target/release/anodizer check config

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          cache-key: ci-coverage
          task: "true"
          tools: cargo-llvm-cov,cargo-nextest
          linux-packaging-tools: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run coverage and update badge
        run: task coverage:publish
