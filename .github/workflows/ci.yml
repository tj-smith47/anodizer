name: CI

on:
  push:
    branches: [master, 'session-*/**']
  pull_request:
  # recovery trigger: lets CI run on a head whose push was suppressed
  # (e.g. a skip marker inherited into a revert subject)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  # actions/checkout's internal `git init` prints a defaultBranch hint on GitHub
  # runners that don't set init.defaultBranch; pin it via git's env-config so the
  # hint never fires (binds every git invocation regardless of HOME or global config).
  GIT_CONFIG_COUNT: '1'
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: master

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install actionlint
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          version=1.7.12
          base="https://github.com/rhysd/actionlint/releases/download/v${version}"
          curl -fsSL --retry 5 -O "${base}/actionlint_${version}_linux_amd64.tar.gz"
          curl -fsSL --retry 5 -O "${base}/actionlint_${version}_checksums.txt"
          grep " actionlint_${version}_linux_amd64.tar.gz\$" "actionlint_${version}_checksums.txt" | sha256sum -c -
          tar -xzf "actionlint_${version}_linux_amd64.tar.gz" actionlint
      - name: Lint workflows
        run: |
          "${RUNNER_TEMP}/actionlint" -color
      # yq ships preinstalled on the ubuntu-latest runner image.
      - name: Audit job timeouts
        run: .claude/scripts/audit-job-timeouts.sh
      - name: Audit gate mirror
        run: .claude/scripts/audit-gate-mirror.sh
      - name: Audit workflow lockstep
        run: .claude/scripts/audit-workflow-lockstep.sh

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache: "false"
          task: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          sccache: "true"
          task: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-audit
          cache: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Audit dependencies for RUSTSEC advisories
        run: cargo audit

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Job-level belt against a wedged harness; baseline is ~12 min.
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
      # The release-binary bootstrap runs on master, Linux only — used by the
      # `release` job's `--publish-only` step (consumed via
      # `from-artifact: anodizer-linux`) and the snapshot dry-run. Stated once
      # here so both the build and upload steps gate on the same condition.
      RELEASE_BOOTSTRAP: ${{ github.ref == 'refs/heads/master' && matrix.os == 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
          task: "true"
          tools: cargo-nextest
          # The Linux determinism integration test drives the nfpm stage, which
          # the gate hard-fails on (no silent skip) when nfpm is absent.
          nfpm: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # Make the WiX toolchain reachable so the Windows test shard actually
      # executes msi_is_byte_reproducible_across_time (the MSI determinism
      # verdict) instead of hermetically skipping. v3 ships preinstalled on the
      # hosted image but its bin dir is off PATH (actions/runner-images#9551);
      # add it, and install the v4 `wix` dotnet tool so either WiX dialect the
      # test resolves is present.
      - name: Set up WiX (MSI determinism test)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          printf '%s\n' 'C:\Program Files (x86)\WiX Toolset v3.14\bin' >> "$GITHUB_PATH"
          # `install` errors if the tool is already present; fall back to `update`
          # (a no-op success when current) so a genuine install failure still fails
          # the step instead of being swallowed by `|| true` — which would let the
          # MSI determinism test silently revert to its skip-with-pass path.
          dotnet tool install --global wix || dotnet tool update --global wix
      - name: Tests
        run: task test
      - name: Build release binary
        if: env.RELEASE_BOOTSTRAP == 'true'
        run: task build
      - name: Upload release binary
        if: env.RELEASE_BOOTSTRAP == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: anodizer-linux
          path: target/release/anodizer

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
          task: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate release pipeline
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          args: release --snapshot --single-target --clean --dry-run

  validate-readme:
    name: Validate README YAML
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
      - name: Validate README config blocks
        run: cargo xtask validate-readme

  check-config:
    name: Check Config
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          sccache: "true"
      - name: Build anodize CLI
        run: cargo build --release -p anodizer
      - name: Validate .anodizer.yaml
        run: ./target/release/anodizer check config

  native-object-determinism:
    name: Native Object Determinism (Windows)
    runs-on: windows-latest
    # Two full C-heavy dep builds (aws-lc-sys/ring/zstd-sys/lzma-sys/blake3) plus
    # a cargo clean between them; baseline is well under 30 min but keep the
    # same headroom as the other real-build jobs in this workflow.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No sccache here (unlike the other Rust jobs): the guard rebuilds the
      # same crates twice to compare their C objects, and a compile cache
      # would return the same cached object for both builds regardless of
      # whether clang-cl codegen is actually deterministic, hiding the exact
      # regression this job exists to catch.
      - uses: ./.github/actions/setup-rust
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Native object determinism (clang-cl)
        shell: bash
        run: bash scripts/native-object-determinism.sh

  # PR-blocking freshness gate. Shared with docs.yml's deploy-gating check via
  # the reusable docs-check.yml so both moments (pre-merge here, pre-deploy
  # there) verify the identical freshness step. Runs on pull_request (and master
  # push); docs.yml's copy only fires post-merge on master.
  docs-check:
    uses: ./.github/workflows/docs-check.yml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          cache-key: ci-coverage
          task: "true"
          tools: cargo-llvm-cov,cargo-nextest
          linux-packaging-tools: "true"
          nfpm: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run coverage and update badge
        run: task coverage:publish
