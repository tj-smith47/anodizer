name: CI

on:
  push:
    branches: [master, 'session-*/**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-task@v2
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: anodize-linux
            bin: target/release/anodize
          - os: macos-latest
            artifact: anodize-macos
            bin: target/release/anodize
          - os: windows-latest
            artifact: anodize-windows
            bin: target/release/anodize.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-task@v2
      - name: Tests
        run: task test
      # Build release binary for reuse in release workflow (avoids
      # rebuilding on each platform — saves ~15 min on Windows)
      - name: Build release binary
        if: github.ref == 'refs/heads/master'
        run: task build
      - name: Upload release binary
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bin }}

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-task@v2
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          install-only: true
      - name: Validate release pipeline
        run: anodize release --snapshot --single-target --clean --dry-run

  tag:
    name: Auto-tag
    if: github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test, package, snapshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          install-only: true
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Auto-tag release
        run: |
          anodize tag
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
