name: CI

on:
  push:
    branches: [master, 'session-*/**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tests
        run: task test
      # Build release binary on Linux only — used as bootstrap for
      # release workflow --split and for the snapshot dry-run job.
      - name: Build release binary
        if: github.ref == 'refs/heads/master' && runner.os == 'Linux'
        run: task build
      - name: Upload release binary
        if: github.ref == 'refs/heads/master' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: anodizer-linux
          path: target/release/anodizer

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release pipeline
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          args: release --snapshot --single-target --clean --dry-run

  determinism-fast:
    name: Determinism (fast, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory while per-stage determinism fixes shake out
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build anodize CLI
        run: cargo build --release -p anodizer
      - name: Run fast determinism check
        run: ./target/release/anodizer check determinism --stages=archive,sbom,sign,checksum --runs=2

  check-config:
    name: Check Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build anodize CLI
        run: cargo build --release -p anodizer
      - name: Validate .anodizer.yaml
        run: ./target/release/anodizer check config --workspace=.

  tag:
    name: Auto-tag
    if: github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test, package, snapshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Auto-tag release
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          args: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Push tags
        run: git push --tags
