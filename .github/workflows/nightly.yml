name: Nightly

# Scheduled nightly, sharded per-OS via anodizer's split/merge flow
# (`partial.by: os` in .anodizer.yaml): each shard cross-builds only the
# targets its host OS can genuinely link, then a merge leg fuses the shard
# dists and runs the post-build pipeline (archive/sign/publish the nightly
# prerelease). A single ubuntu runner cannot serve the whole matrix — the
# darwin targets link Apple frameworks (Security/CoreFoundation via
# rustls-native-certs / rustls-platform-verifier) that zig cannot resolve
# without a macOS SDK, so the darwin leg must build on a macOS host, exactly
# like the release pipeline's determinism shards. workflow_dispatch stays for
# on-demand runs.
on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  # attestations.enabled in .anodizer.yaml routes built artifacts through the
  # action's attest-build-provenance step (OIDC), which needs id-token +
  # attestations write. Cosign signing is key-based (--key=env://COSIGN_KEY),
  # so id-token here serves SLSA provenance only, not keyless signing.
  id-token: write
  attestations: write

concurrency:
  # Mutually exclusive with release.yml's publish (see its concurrency note):
  # this group + cancel-in-progress: false MUST match release.yml byte-for-byte,
  # enforced by audit-workflow-lockstep.sh.
  group: release-${{ github.repository }}
  cancel-in-progress: false

# actions/checkout's internal `git init` prints a defaultBranch hint on GitHub
# runners that don't set init.defaultBranch; pin it via git's env-config so the
# hint never fires (binds every git invocation regardless of HOME or global config).
env:
  GIT_CONFIG_COUNT: '1'
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: master

jobs:
  build:
    strategy:
      # A missing shard fails the merge's matrix.json cross-check anyway;
      # letting the siblings finish surfaces every per-OS failure in one run.
      fail-fast: false
      matrix:
        # auto-install mirrors the determinism shards: ubuntu needs zig +
        # cargo-zigbuild for the aarch64-linux-gnu cross build; macOS builds
        # darwin targets with the built-in toolchain; Windows builds the msvc
        # target natively but keeps auto-install for configured-stage tools.
        include:
          - { os: ubuntu-latest,  shard: linux,   auto_install: 'true' }
          - { os: macos-latest,   shard: darwin,  auto_install: 'false' }
          - { os: windows-latest, shard: windows, auto_install: 'true' }
    name: Nightly build (${{ matrix.shard }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # --split builds only this host's `partial.by: os` slice and writes
      # dist/<os>/context.json + dist/matrix.json for the merge leg.
      - name: Build the nightly shard (release --nightly --split)
        uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: master
          auto-install: ${{ matrix.auto_install }}
          args: release --nightly --split --no-preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # upload-artifact drops dotfiles by default; a hidden deliverable
      # silently stripped here would only surface as a merge-time failure.
      - name: Upload shard dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-dist-${{ matrix.shard }}
          path: dist/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Nightly publish (merge)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download shard dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          pattern: nightly-dist-*
          merge-multiple: true

      # --merge fuses the shard contexts (validated against matrix.json) and
      # resumes the pipeline from the post-build stages, publishing the
      # nightly prerelease.
      - name: Publish the merged nightly (release --nightly --merge)
        uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: master
          auto-install: 'true'
          args: release --nightly --merge --no-preflight
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
