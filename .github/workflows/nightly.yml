name: Nightly

# No schedule: nightly is disabled pending a decision on its target-coverage
# contract (full release matrix vs. linux-only from a single runner).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: master
          # zig + cargo-zigbuild (plus the other configured-stage tools):
          # cross-arch linux-gnu builds need zigbuild's bundled cc, same
          # toolchain the determinism shards install.
          auto-install: 'true'
          args: release --nightly --no-preflight
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
