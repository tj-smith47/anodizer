name: Nightly

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

# Shares release.yml's group so a nightly publish never interleaves with a release run.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: master
          args: release --nightly --no-preflight
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          # GH_PAT: nightly publish pushes to external publisher repos, beyond GITHUB_TOKEN's same-repo scope.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
