name: Nightly

# Scheduled nightly: the cross-toolchain blocker is resolved — auto-install
# provisions zig + cargo-zigbuild from `cross: auto`, the same path the green
# ubuntu determinism shard uses to cross-build aarch64-unknown-linux-gnu — so
# the daily cron fires the end-to-end publish path unattended. workflow_dispatch
# stays for on-demand runs.
on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  # attestations.enabled in .anodizer.yaml routes built artifacts through the
  # action's attest-build-provenance step (OIDC), which needs id-token +
  # attestations write. Cosign signing is key-based (--key=env://COSIGN_KEY),
  # so id-token here serves SLSA provenance only, not keyless signing.
  id-token: write
  attestations: write

concurrency:
  # Mutually exclusive with release.yml's publish (see its concurrency note):
  # this group + cancel-in-progress: false MUST match release.yml byte-for-byte,
  # enforced by audit-workflow-lockstep.sh.
  group: release-${{ github.repository }}
  cancel-in-progress: false

# actions/checkout's internal `git init` prints a defaultBranch hint on GitHub
# runners that don't set init.defaultBranch; pin it via git's env-config so the
# hint never fires (binds every git invocation regardless of HOME or global config).
env:
  GIT_CONFIG_COUNT: '1'
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: master

jobs:
  nightly:
    runs-on: ubuntu-latest
    # Builds the anodizer tool from master, then cross-builds + publishes the
    # full nightly matrix; bounded generously against a wedged publish leg.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: master
          # zig + cargo-zigbuild (plus the other configured-stage tools):
          # cross-arch linux-gnu builds need zigbuild's bundled cc, same
          # toolchain the determinism shards install.
          auto-install: 'true'
          args: release --nightly --no-preflight
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
