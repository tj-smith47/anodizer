name: Determinism harness

# Reusable byte-for-byte reproducibility gate. Builds the release twice per
# shard in a hermetic worktree and fails if any produced artifact differs
# between runs. Sharded by host/target so each shard byte-verifies the platform
# it natively builds — the cross-platform coverage a single Linux job cannot
# give. Called by release.yml (and invocable on its own via workflow_dispatch
# of a caller) so the shard matrix lives in exactly one place.

on:
  workflow_call:
    inputs:
      head_sha:
        description: Commit SHA to check out and byte-verify reproducibility against.
        required: true
        type: string

permissions:
  contents: read

jobs:
  shard:
    name: Determinism (${{ matrix.shard }})
    strategy:
      fail-fast: false
      matrix:
        # det_stages: the harness `--stages=` list is ALSO the build filter —
        # any produce-stage not named lands in the child release's `--skip=`
        # complement and never builds. Each installer is therefore routed to
        # the shard that already holds its payload binary, because Linux cannot
        # cross-compile a darwin/windows-msvc binary (the very reason this
        # harness is sharded):
        #
        #   appbundle / dmg / pkg  -> macOS shard   (needs the darwin binary)
        #   msi / nsis             -> Windows shards (need the windows binary)
        #
        # A stage that runs on a shard without its payload binary no-ops
        # silently — exactly how these five formats shipped in NO release for
        # so long (they were listed on the linux-only ubuntu shard, which
        # produces no darwin/windows binary to package). So each shard lists
        # the core produce set PLUS only the installers whose payload it
        # natively builds. On the macOS shard appbundle precedes dmg/pkg so
        # their `use: appbundle` finds a source `.app` artifact.
        #
        # Reproducibility verdict per format (the harness byte-compares the
        # GATED ones and counts any drift as a regression; the ALLOWLISTED
        # ones are intrinsically non-reproducible — see crates/core/src/
        # determinism.rs seed_from_commit — and the harness excludes them from
        # drift_count while still surfacing them in the report):
        #
        #   appbundle  GATED       pure file assembly, byte-reproducible
        #                          (appbundle_is_byte_reproducible_across_time)
        #   nsis       GATED       makensis honors SOURCE_DATE_EPOCH, byte-
        #                          reproducible (nsis_setup_is_byte_-
        #                          reproducible_across_time)
        #   dmg        ALLOWLISTED hdiutil writes a fresh UDIF koly SegmentID
        #                          GUID per run; native, non-reproducible
        #   pkg        ALLOWLISTED macOS-native pkgbuild stamps a wall-clock
        #                          xar TOC and ignores SOURCE_DATE_EPOCH
        #   msi        ALLOWLISTED WiX regenerates a random PackageCode GUID +
        #                          Created/LastModified (wixtoolset/issues#8978)
        #
        # Installer-tool provisioning is by-shard, driven by the action's
        # `auto-install` (which reads .anodizer.yaml and installs each
        # configured stage's tools). macOS runners ship hdiutil + pkgbuild
        # built-in and appbundle needs no external tool, so the macOS shard
        # keeps auto_install off — no install is needed and skipping it avoids
        # unnecessary install risk. The Windows shards enable auto_install so
        # the action provisions the msi + nsis tools: WiX v3 (candle+light, via
        # the action's dialect-aware install — anodizer's packaging/anodizer.wxs
        # is v3-dialect) and makensis. Because each installer stage is
        # EXPLICITLY named in det_stages, the harness HARD-FAILS (not
        # warn-skips) if its tool is missing — a silent skip is the exact
        # false coverage that hid these formats.
        #
        # `docker` is Linux-only and present ONLY on the ubuntu shard. It
        # drives the `--output=type=oci,rewrite-timestamp=true` BuildKit
        # exporter and byte-compares the OCI tarball + image digest across
        # runs, so a drifting docker image cannot ship undetected. The OCI
        # exporter is unsupported by the default `docker` buildx driver, so
        # the ubuntu shard provisions a `docker-container` driver below
        # before the harness runs. Because docker is explicitly requested
        # here, the harness HARD-FAILS (not warn-skips) if buildx is
        # unreachable — a silent skip would be false coverage.
        include:
          - os: ubuntu-latest
            shard: ubuntu-latest
            targets: ''
            det_stages: 'build,source,upx,archive,nfpm,makeself,snapcraft,srpm,sbom,sign,checksum,docker'
            auto_install: 'true'
          - { os: macos-latest,   shard: macos-latest,     targets: '', det_stages: 'build,source,upx,archive,sbom,sign,checksum,appbundle,dmg,pkg', auto_install: 'false' }
          - { os: windows-latest, shard: windows-x86_64,   targets: 'x86_64-pc-windows-msvc',  det_stages: 'build,source,upx,archive,sbom,sign,checksum,msi,nsis', auto_install: 'true' }
          - { os: windows-latest, shard: windows-aarch64,  targets: 'aarch64-pc-windows-msvc', det_stages: 'build,source,upx,archive,sbom,sign,checksum,msi,nsis', auto_install: 'true' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_sha }}

      # The harness's docker stage drives `--output=type=oci`, which the
      # default `docker` buildx driver cannot serve; provision a
      # `docker-container` builder so the OCI exporter works. Ubuntu shard
      # only — docker is Linux-only and absent from the other shards' stages.
      - name: Set up Docker Buildx (docker-container driver for OCI exporter)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - uses: tj-smith47/anodizer-action@v1
        with:
          determinism: 'true'
          determinism-targets: ${{ matrix.targets }}
          determinism-stages: ${{ matrix.det_stages }}
          auto-install: ${{ matrix.auto_install }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.shard }}
          path: preserved-dist/
          if-no-files-found: error
          retention-days: 90

      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: determinism-${{ matrix.shard }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**
          if-no-files-found: warn
          retention-days: 90
