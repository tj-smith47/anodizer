name: Determinism Harness

# Reusable byte-for-byte reproducibility gate. Builds the release twice per
# shard in a hermetic worktree and fails if any produced artifact differs
# between runs. Sharded by host/target so each shard byte-verifies the platform
# it natively builds — the cross-platform coverage a single Linux job cannot
# give. Called by release.yml (and invocable on its own via workflow_dispatch
# of a caller) so the shard matrix lives in exactly one place.

on:
  workflow_call:
    inputs:
      head_sha:
        description: Commit SHA to check out and byte-verify reproducibility against.
        required: true
        type: string

permissions:
  contents: read

jobs:
  shard:
    name: Determinism (${{ matrix.shard }})
    # Double-build-and-byte-compare per shard; observed p100 wall-time ~99.5 min
    # (Windows shards). 150 = ceil(99.5 * 1.5) headroom, well under the implicit
    # 6h default that would let a wedged shard burn a full runner-hour budget.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        # The per-OS stage partition is no longer named here: the harness owns
        # it. `anodize check determinism` with no `--stages` builds the
        # OS-native partition via `default_stages_for_host()`
        # (crates/cli/src/commands/check/determinism.rs) — the single source of
        # truth for which producers each shard byte-verifies and WHY (the
        # payload-binary shard routing AND the per-format reproducibility
        # verdicts now live in that fn's doc comment). This keeps each
        # installer on the shard that natively builds its payload binary
        # (appbundle/dmg/pkg -> macOS, msi/nsis -> Windows, docker/appimage/
        # flatpak/nfpm/... -> Linux) without a hand-written list that drifts.
        #
        # The action runs the harness with `--require-tools` (enforced at
        # tj-smith47/anodizer-action `scripts/determinism/run-harness.sh` — the
        # flag is unconditional, not an input that could be omitted here), so a
        # missing OS-native tool HARD-FAILS the shard instead of warn-skipping —
        # a silent skip is the exact false coverage that once hid the installer
        # formats from every release. The `@v1` pin below is the trust anchor for
        # that guarantee; it moves only via the action's own update-major-tag
        # gate. Installer-tool provisioning stays
        # by-shard: the action's `auto-install` reads .anodizer.yaml and
        # installs each configured stage's tools (macOS keeps it off — hdiutil
        # + pkgbuild are built-in and appbundle needs none; Windows enables it
        # for the WiX v3 + makensis toolchain), and the action separately
        # provisions linuxdeploy + flatpak-builder for the Linux shard. The
        # windows-aarch64 shard still needs its explicit cross `targets`.
        include:
          - os: ubuntu-latest
            shard: ubuntu-latest
            targets: ''
            auto_install: 'true'
          - { os: macos-latest,   shard: macos-latest,     targets: '', auto_install: 'false' }
          - { os: windows-latest, shard: windows-x86_64,   targets: 'x86_64-pc-windows-msvc',  auto_install: 'true' }
          - { os: windows-latest, shard: windows-aarch64,  targets: 'aarch64-pc-windows-msvc', auto_install: 'true' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_sha }}

      # macOS-14 runners ship ~14 GB free, but the darwin determinism build
      # rebuilds the full pipeline twice (universal binary = both arches, then
      # archive/sbom/sign/dmg/pkg) and `hdiutil` stages a temp R/W image before
      # compressing, peaking above that and tipping the second run into the
      # opaque `hdiutil: create failed - No space left on device`. The
      # iOS/tvOS/watchOS simulator runtimes (tens of GB) and the Android SDK are
      # never touched by a Rust + installer build, so reclaiming them is the
      # safe, high-yield headroom the dmg peak needs. The harness's own
      # peak-measured guard (crates/core/src/disk.rs) stays the backstop: if a
      # run is still short it fails fast with the measured numbers rather than a
      # corrupt release, so this step only needs to clear the common case.
      - name: Reclaim disk for the darwin determinism build
        if: matrix.os == 'macos-latest'
        # Best-effort headroom only; the harness's peak-measured guard
        # (crates/core/src/disk.rs) is the real gate. A bug in this reclaim
        # script must never fail the shard — the build proceeds and, if disk is
        # genuinely short, the guard fails fast with the measured numbers.
        continue-on-error: true
        run: |
          set -uo pipefail
          echo "::group::free space before reclaim"
          df -h / /System/Volumes/Data 2>/dev/null || df -h /
          echo "::endgroup::"
          # Fixed runner paths only — no `${VAR:-default}` indirection, so a
          # surprise env value can never widen the `rm -rf` target.
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null || true
          xcrun simctl delete unavailable 2>/dev/null || true
          sudo rm -rf /Users/runner/Library/Android/sdk 2>/dev/null || true
          sudo rm -rf ~/Library/Caches/Homebrew ~/.cocoapods 2>/dev/null || true
          # Drop the non-selected Xcode versions. The darwin build needs only the
          # ACTIVE toolchain — clang, the macOS SDK, hdiutil and pkgbuild all come
          # from it — so every other Xcode_*.app on the image is dead weight. Keep
          # exactly the `xcode-select -p` toolchain; if its path can't be resolved,
          # remove nothing (never risk deleting the live SDK).
          active_xcode="$(xcode-select -p 2>/dev/null | sed 's#/Contents/Developer##')"
          if [ -n "$active_xcode" ]; then
            for xc in /Applications/Xcode*.app; do
              [ -e "$xc" ] || continue
              [ "$xc" = "$active_xcode" ] || sudo rm -rf "$xc" 2>/dev/null || true
            done
          fi
          echo "::group::free space after reclaim"
          df -h / /System/Volumes/Data 2>/dev/null || df -h /
          echo "::endgroup::"

      # The harness's docker stage drives `--output=type=oci`, which the
      # default `docker` buildx driver cannot serve; provision a
      # `docker-container` builder so the OCI exporter works. Ubuntu shard
      # only — docker is Linux-only and absent from the other shards' stages.
      - name: Set up Docker Buildx (docker-container driver for OCI exporter)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - uses: tj-smith47/anodizer-action@v1
        with:
          determinism: 'true'
          determinism-targets: ${{ matrix.targets }}
          auto-install: ${{ matrix.auto_install }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.shard }}
          path: preserved-dist/
          if-no-files-found: error
          retention-days: 90

      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: determinism-${{ matrix.shard }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**
          if-no-files-found: warn
          retention-days: 90
