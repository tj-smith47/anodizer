name: Determinism harness

# Reusable byte-for-byte reproducibility gate. Builds the release twice per
# shard in a hermetic worktree and fails if any produced artifact differs
# between runs. Sharded by host/target so each shard byte-verifies the platform
# it natively builds — the cross-platform coverage a single Linux job cannot
# give. Called by release.yml (and invocable on its own via workflow_dispatch
# of a caller) so the shard matrix lives in exactly one place.

on:
  workflow_call:
    inputs:
      head_sha:
        description: Commit SHA to check out and byte-verify reproducibility against.
        required: true
        type: string

permissions:
  contents: read

jobs:
  shard:
    name: Determinism (${{ matrix.shard }})
    strategy:
      fail-fast: false
      matrix:
        # det_stages: the harness `--stages=` list is ALSO the build filter —
        # any produce-stage not named lands in the child release's `--skip=`
        # complement and never builds. The ubuntu shard cross-builds every
        # target and owns the Linux-native installer fallback toolchain
        # (wixl/makensis/xar+mkbom/genisoimage), so it is the only shard that
        # byte-verifies the macOS+Windows installer formats; it requests the
        # full set explicitly (empty default omits installers). appbundle is
        # listed before dmg/pkg so their `use: appbundle` finds a source
        # artifact. The macOS/Windows shards build only their native binaries
        # + archives, so they keep the empty (OS-default) stage list.
        #
        # `docker` is Linux-only and present ONLY on the ubuntu shard. It
        # drives the `--output=type=oci,rewrite-timestamp=true` BuildKit
        # exporter and byte-compares the OCI tarball + image digest across
        # runs, so a drifting docker image cannot ship undetected. The OCI
        # exporter is unsupported by the default `docker` buildx driver, so
        # the ubuntu shard provisions a `docker-container` driver below
        # before the harness runs. Because docker is explicitly requested
        # here, the harness HARD-FAILS (not warn-skips) if buildx is
        # unreachable — a silent skip would be false coverage.
        #
        # What this harness does NOT cover: the NATIVE installer tools
        # (hdiutil .dmg, pkgbuild .pkg, WiX .msi) are non-reproducible by nature
        # — hdiutil writes a fresh UDIF koly SegmentID GUID, pkgbuild stamps a
        # wall-clock xar TOC and ignores SOURCE_DATE_EPOCH, and WiX regenerates a
        # random PackageCode GUID + Created/LastModified (wixtoolset/issues#8978)
        # — and anodizer does not normalize the native tools' output. Their
        # reproducibility verdict is proven on the matching OS shard of ci.yml's
        # `test` job by the two-build unit tests {msi,dmg,native_pkgbuild}_pkg_*
        # _is_byte_reproducible_across_time, not here. This harness byte-verifies
        # the LINUX-FALLBACK installer builds (wixl/xar+mkbom/genisoimage), which
        # anodizer DOES normalize to byte-stability, on the ubuntu shard.
        # auto_install installs the installer fallback tools from .anodizer.yaml
        # on the ubuntu shard (auto-detect is OS-guarded, so enabling it on the
        # native shards would not pull the Linux-only installer toolchain).
        include:
          - os: ubuntu-latest
            shard: ubuntu-latest
            targets: ''
            det_stages: 'build,source,upx,archive,nfpm,makeself,snapcraft,srpm,sbom,sign,checksum,appbundle,dmg,pkg,msi,nsis,docker'
            auto_install: 'true'
          - { os: macos-latest,   shard: macos-latest,     targets: '', det_stages: '', auto_install: 'false' }
          - { os: windows-latest, shard: windows-x86_64,   targets: 'x86_64-pc-windows-msvc',  det_stages: '', auto_install: 'false' }
          - { os: windows-latest, shard: windows-aarch64,  targets: 'aarch64-pc-windows-msvc', det_stages: '', auto_install: 'false' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_sha }}

      # The harness's docker stage drives `--output=type=oci`, which the
      # default `docker` buildx driver cannot serve; provision a
      # `docker-container` builder so the OCI exporter works. Ubuntu shard
      # only — docker is Linux-only and absent from the other shards' stages.
      - name: Set up Docker Buildx (docker-container driver for OCI exporter)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - uses: tj-smith47/anodizer-action@v1
        with:
          determinism: 'true'
          determinism-targets: ${{ matrix.targets }}
          determinism-stages: ${{ matrix.det_stages }}
          auto-install: ${{ matrix.auto_install }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.shard }}
          path: preserved-dist/
          if-no-files-found: error
          retention-days: 90

      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: determinism-${{ matrix.shard }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**
          if-no-files-found: warn
          retention-days: 90
