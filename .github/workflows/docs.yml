name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/site/**"
      - "crates/xtask/**"
      - "crates/cli/src/lib.rs"
      - "crates/core/src/config.rs"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs-check:
    name: Docs freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check generated docs are up-to-date
        run: cargo xtask gen-docs --check

  build:
    needs: docs-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola

      - name: Generate reference docs
        run: cargo xtask gen-docs

      - name: Generate JSON Schema
        run: |
          cargo build --release -p anodize
          ./target/release/anodize jsonschema > docs/site/static/schema.json

      - name: Build site
        run: cd docs/site && zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
