name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/site/**"
      - "crates/xtask/**"
      - "crates/cli/src/lib.rs"
      # config is a directory of per-section modules, not a single file; the
      # generated config reference derives from all of them.
      - "crates/core/src/config/**"
  # Release-driven redeploy: fires on every completion of the Release
  # workflow, but the `gate` job below proceeds ONLY when that run actually
  # cut + published a version (see its rationale). A bump=none Release run
  # succeeds without publishing, and must not trigger a no-op docs deploy.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Read the triggering Release run's job list (the `gate` job's cut check).
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  gate:
    name: Resolve deploy trigger
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Decide whether this event should deploy
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Docs-source pushes and manual dispatches always deploy — they are
          # direct edits to the published site, not release-gated.
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event_name }} -> deploy"
            exit 0
          fi
          # Release-driven path. Deploy ONLY when the triggering Release run
          # actually cut + published a version. The Release pipeline gates its
          # "Publish Release" job on resolve-release-target's tagged==true
          # (.github/workflows/release.yml), so that job's `success` IS the
          # auto-derived "a version was cut" signal — no hand-maintained input,
          # no fragile cross-workflow output plumbing. A bump=none run leaves
          # "Publish Release" skipped/absent and must NOT redeploy docs.
          run_id='${{ github.event.workflow_run.id }}'
          conclusion=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${run_id}/jobs" \
            --paginate --jq '.jobs[] | select(.name == "Publish Release") | .conclusion' \
            | head -n1)
          if [ "${conclusion:-}" = "success" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Release run ${run_id} published (Publish Release: success) -> deploy"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Release run ${run_id} did not publish (Publish Release: ${conclusion:-absent}) -> skip docs deploy"
          fi

  # Deploy-gating freshness check — the same reusable step body ci.yml runs
  # PR-blocking, so a stale-docs deploy can never slip a check the PR gate lacks.
  docs-check:
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    uses: ./.github/workflows/docs-check.yml

  build:
    needs: [gate, docs-check]
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-docs
        with:
          cache-targets: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Zola
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: zola

      - name: Generate reference docs
        run: task docs

      - name: Generate JSON Schema
        run: |
          task build
          ./target/release/anodizer jsonschema > docs/site/static/schema.json

      - name: Build site
        run: cd docs/site && zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [gate, build]
    if: needs.gate.outputs.should_deploy == 'true'
    timeout-minutes: 15
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
