# Manual one-shot publish of a single publisher — determinism-free.
#
# Re-publishes a single publisher (default npm) for an ALREADY-RELEASED tag
# whose other publishers landed but this one did not (e.g. npm fell behind
# cargo because a publish-only preflight aborted it). Unlike the main Release
# pipeline this runs NO determinism harness: the binaries the publisher wraps
# come from the byte-proven `dist-*` artifacts a prior Release run already
# preserved (`dist_run_id`), so there is nothing left to re-prove and the
# round-trip is a single fast job.
#
# Two refs are deliberately SEPARATE:
#   * `tag`         — the released tag, checked out as the WORKDIR. anodizer's
#                     publish-only path derives the published version from the
#                     workdir Cargo.toml and guards that HEAD points at that
#                     version's tag, so the workdir MUST be the tag (not master).
#   * `from_branch` — the branch the publishing BINARY is built from. Built
#                     fresh (not the released artifact) so it carries
#                     publish-path fixes the broken release shipped without.
# The preserved-dist download uses the SAME download-preserved-dist composite
# the Release pipeline uses, so a manual re-publish reconstructs the dist
# byte-for-byte the way the original run shipped it. A `./` composite resolves
# from the checked-out tag tree and older tags predate the composite, so it is
# checked out separately from master into a side path and referenced from there
# — one copy of the download policy instead of an inlined second.
name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Released tag to publish, e.g. v0.10.0 (its Cargo.toml version + the preserved dist must agree).
        required: true
      publishers:
        description: Publisher allowlist passed to `--publishers` (comma-separated).
        required: true
        default: npm
      dist_run_id:
        description: Release run id whose preserved `dist-*` artifacts to wrap (the run that shipped the rest of this tag).
        required: true
      from_branch:
        description: Branch of tj-smith47/anodizer to build the publishing binary from (carries publish-path fixes; separate from `tag`).
        required: false
        default: master
      skip:
        description: >-
          Comma-separated stages to pass to `--skip=` (empty = skip nothing).
          Defaults to `verify-release`: a manual publish re-publishes one
          publisher for an already-released, already-verified tag and produces no new
          release assets, while verify-release re-runs whole-release install
          smoke-tests that pull cross-arch (e.g. arm64) packages — these cannot
          execute on an amd64 github-hosted runner without qemu/binfmt and would
          spuriously fail the run after the publish already landed. Override to
          `""` on a runner with emulation, or to widen the skip set.
        required: false
        default: verify-release
      dry_run:
        description: >-
          Resolve and stage the publish without writing to the registry. Leave
          on while iterating; turn off for the real publish.
        type: boolean
        default: true

concurrency:
  group: manual-publish-${{ inputs.publishers }}-${{ inputs.tag }}
  cancel-in-progress: false

# actions/checkout's internal `git init` prints a defaultBranch hint on GitHub
# runners that don't set init.defaultBranch; pin it via git's env-config so the
# hint never fires (binds every git invocation regardless of HOME or global config).
env:
  GIT_CONFIG_COUNT: '1'
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: master

jobs:
  manual-publish:
    name: Manual publish ${{ inputs.publishers }} @ ${{ inputs.tag }}${{ inputs.dry_run && ' (dry-run)' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # OIDC for any publisher using Trusted Publishing / SLSA provenance (npm, cargo, mcp)
      attestations: write # anodizer-action's build-provenance step writes artifact attestations to the GH attestations API
    steps:
      - name: Check out the released tag (workdir = published version)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetch tags so the HEAD-points-at-tag guard resolves
          ref: ${{ inputs.tag }}

      - name: Check out master's release actions (composite host)
        # The download-preserved-dist composite lives on master; the workdir is
        # the released tag, which may predate it, so fetch just the actions tree
        # from master into a side path and reference the composite from there.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master
          path: .release-actions
          sparse-checkout: .github/actions

      - name: Download preserved dist artifacts
        uses: ./.release-actions/.github/actions/download-preserved-dist
        with:
          run-id: ${{ inputs.dist_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run anodizer release --publish-only
        uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: ${{ inputs.from_branch }}
          install: node
          args: release --publish-only --publishers ${{ inputs.publishers }}${{ inputs.skip && format(' --skip={0}', inputs.skip) || '' }}${{ inputs.dry_run && ' --dry-run' || '' }}
        env:
          # The publish binary is built from `from_branch`, so its compiled
          # version (e.g. master's 0.11.2) drives the HEAD-points-at-tag guard —
          # which would demand v0.11.2 even though the workdir is the v0.10.0
          # tag. Pin the guard to the tag actually being published; the per-crate
          # publish version still comes from the preserved dist context.
          ANODIZER_CURRENT_TAG: ${{ inputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          # NPM_TOKEN authenticates the publish. Trusted Publishing (OIDC) is NOT
          # used: it requires a per-package trusted-publisher binding configured by
          # hand on npmjs.com, and the optional-deps layout fans out to ~9 packages
          # (the umbrella + one per platform), several of which do not exist yet on
          # first publish — a Trusted Publisher cannot attach to a missing package.
          # The token publishes (and creates) them all; provenance still attaches
          # from this github-hosted runner's OIDC when the runner supports it.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
