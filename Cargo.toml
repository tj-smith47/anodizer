[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/stage-build",
    "crates/stage-archive",
    "crates/stage-nfpm",
    "crates/stage-checksum",
    "crates/stage-changelog",
    "crates/stage-release",
    "crates/stage-publish",
    "crates/stage-docker",
    "crates/stage-sign",
    "crates/stage-announce",
    "crates/stage-source",
    "crates/stage-upx",
    "crates/stage-snapcraft",
    "crates/stage-dmg",
    "crates/stage-msi",
    "crates/stage-pkg",
    "crates/stage-blob",
    "crates/stage-nsis",
    "crates/stage-appbundle",
    "crates/stage-flatpak",
    "crates/stage-notarize",
    "crates/stage-templatefiles",
    "crates/stage-makeself",
    "crates/stage-srpm",
    "crates/stage-sbom",
    "crates/cli",
    "crates/xtask",
]
# xtask is a dev-only tool (doc generation) invoked via `cargo xtask`.
# Exclude it from default-members so plain `cargo build`/`test`/`clippy`
# don't compile it — shaves ~20% off the CI test job.
default-members = [
    "crates/core",
    "crates/stage-build",
    "crates/stage-archive",
    "crates/stage-nfpm",
    "crates/stage-checksum",
    "crates/stage-changelog",
    "crates/stage-release",
    "crates/stage-publish",
    "crates/stage-docker",
    "crates/stage-sign",
    "crates/stage-announce",
    "crates/stage-source",
    "crates/stage-upx",
    "crates/stage-snapcraft",
    "crates/stage-dmg",
    "crates/stage-msi",
    "crates/stage-pkg",
    "crates/stage-blob",
    "crates/stage-nsis",
    "crates/stage-appbundle",
    "crates/stage-flatpak",
    "crates/stage-notarize",
    "crates/stage-templatefiles",
    "crates/stage-makeself",
    "crates/stage-srpm",
    "crates/stage-sbom",
    "crates/cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/tj-smith47/anodize"
authors = ["TJ Smith"]
keywords = ["release", "automation", "cargo", "ci-cd", "packaging"]
categories = ["command-line-utilities", "development-tools"]

[workspace.dependencies]
anodize-core = { path = "crates/core", version = "0.1.0" }
anodize-stage-build = { path = "crates/stage-build", version = "0.1.0" }
anodize-stage-archive = { path = "crates/stage-archive", version = "0.1.0" }
anodize-stage-nfpm = { path = "crates/stage-nfpm", version = "0.1.0" }
anodize-stage-checksum = { path = "crates/stage-checksum", version = "0.1.0" }
anodize-stage-changelog = { path = "crates/stage-changelog", version = "0.1.0" }
anodize-stage-release = { path = "crates/stage-release", version = "0.1.0" }
anodize-stage-publish = { path = "crates/stage-publish", version = "0.1.0" }
anodize-stage-docker = { path = "crates/stage-docker", version = "0.1.0" }
anodize-stage-sign = { path = "crates/stage-sign", version = "0.1.0" }
anodize-stage-announce = { path = "crates/stage-announce", version = "0.1.0" }
anodize-stage-source = { path = "crates/stage-source", version = "0.1.0" }
anodize-stage-sbom = { path = "crates/stage-sbom", version = "0.1.0" }
anodize-stage-upx = { path = "crates/stage-upx", version = "0.1.0" }
anodize-stage-snapcraft = { path = "crates/stage-snapcraft", version = "0.1.0" }
anodize-stage-dmg = { path = "crates/stage-dmg", version = "0.1.0" }
anodize-stage-msi = { path = "crates/stage-msi", version = "0.1.0" }
anodize-stage-pkg = { path = "crates/stage-pkg", version = "0.1.0" }
anodize-stage-blob = { path = "crates/stage-blob", version = "0.1.0" }
anodize-stage-nsis = { path = "crates/stage-nsis", version = "0.1.0" }
anodize-stage-appbundle = { path = "crates/stage-appbundle", version = "0.1.0" }
anodize-stage-flatpak = { path = "crates/stage-flatpak", version = "0.1.0" }
anodize-stage-notarize = { path = "crates/stage-notarize", version = "0.1.0" }
anodize-stage-templatefiles = { path = "crates/stage-templatefiles", version = "0.1.0" }
anodize-stage-makeself = { path = "crates/stage-makeself", version = "0.1.0" }
anodize-stage-srpm = { path = "crates/stage-srpm", version = "0.1.0" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
toml = "0.8"
toml_edit = "0.22"
regex = "1"
semver = "1"
flate2 = "1"
tar = "0.4"
zip = { version = "2", default-features = false, features = ["deflate"] }
tempfile = "3"
sha1 = "0.10"
sha2 = "0.10"
blake2 = "0.10"
octocrab = "0.44"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "multipart", "stream", "rustls-tls"] }
percent-encoding = "2"
colored = "2"
chrono = "0.4"
xz2 = "0.1"
zstd = "0.13"
filetime = "0.2"
glob = "0.3"
http = "1"
hyper-rustls = { version = "0.27", default-features = false, features = ["http1", "http2", "ring", "tls12", "logging", "native-tokio"] }
hyper-util = { version = "0.1", features = ["client-legacy"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "std", "tls12"] }
object_store = { version = "0.13", features = ["aws", "gcp", "azure"] }
serial_test = "3"
schemars = "0.8"
tera = "1.20.1"
sha3 = "0.10"
blake3 = "1"
crc32fast = "1"
md-5 = "0.10"
hmac = "0.12"
base64 = "0.22"
lettre = { version = "0.11", default-features = false, features = ["builder", "hostname", "smtp-transport", "rustls-tls"] }
