[alias]
xtask = "run --package xtask --"

# Windows MSVC determinism: pass `/Brepro` to link.exe so the PE COFF
# `TimeDateStamp` is set to a content hash (deterministic across runs)
# instead of the wall-clock build time. Without this, every Windows
# `anodizer.exe` built from the same source differs in 4 header bytes,
# propagating drift into every archive that wraps the binary. The
# determinism harness (which sets `RUSTFLAGS` env, suppressing this
# `[target.<triple>] rustflags` table per cargo's precedence rules)
# mirrors the same `link-arg=/Brepro` via
# `CARGO_TARGET_<triple>_RUSTFLAGS` — see `build_subprocess_env` in
# `crates/cli/src/determinism_harness.rs`.
#
# `/Brepro` is MSVC-link-specific; we MUST scope it per-target rather
# than via `[build] rustflags` because rustc forwards `link-arg`
# verbatim to the active linker, and lld / ld would reject the flag.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/Brepro"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/Brepro"]
