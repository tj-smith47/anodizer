[alias]
xtask = "run --package xtask --"

# Windows MSVC determinism. MSVC-only flags (`link-arg=/...`) must be
# scoped per-target — `[build] rustflags` would forward them to lld /
# ld on Linux/macOS, which reject MSVC syntax. The determinism harness
# mirrors these flags via `CARGO_TARGET_<triple>_RUSTFLAGS` because the
# harness sets `RUSTFLAGS` for `--remap-path-prefix`, which (per cargo
# precedence) suppresses these per-target entries — see
# `build_subprocess_env` in `crates/cli/src/determinism_harness.rs`.
#
# Single source of truth: this list MUST stay byte-identical to
# `anodizer_core::determinism::MSVC_DETERMINISM_RUSTFLAGS` (a cargo config
# file cannot import a Rust const). The const's unit test
# `msvc_rustflags_const_matches_cargo_config` reads this file via
# `include_str!` and fails the build if the two drift.
#
# Flags:
#   - `codegen-units=1` — single codegen unit so cross-CU function
#     ordering doesn't shuffle the resulting symbol/section layout
#     (drives Data Directory RVA stability past PE offset 0x108).
#   - `/Brepro` — substitutes PE `TimeDateStamp` with a content hash.
#     <https://learn.microsoft.com/en-us/cpp/build/reference/brepro>
#   - `/OPT:NOICF` — disables Identical COMDAT Folding, whose fold
#     decisions depend on input-file presentation order.
#   - `/INCREMENTAL:NO` — cargo's stock release default already disables
#     incremental linking, but it's set explicitly because `/Brepro` is
#     incompatible with incremental linking and a future profile edit (e.g.
#     a custom `[profile.release]` with `incremental = true`) shouldn't
#     silently re-enable it.
#   - `/DEBUG:NONE` — do not emit a PDB or CodeView debug record.
#     Eliminates the debug directory entry whose GUID would otherwise
#     have to be carefully content-hashed for reproducibility.
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "codegen-units=1",
    "-C", "link-arg=/Brepro",
    "-C", "link-arg=/OPT:NOICF",
    "-C", "link-arg=/INCREMENTAL:NO",
    "-C", "link-arg=/DEBUG:NONE",
    "-C", "strip=symbols",
]

[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "codegen-units=1",
    "-C", "link-arg=/Brepro",
    "-C", "link-arg=/OPT:NOICF",
    "-C", "link-arg=/INCREMENTAL:NO",
    "-C", "link-arg=/DEBUG:NONE",
    "-C", "strip=symbols",
]
